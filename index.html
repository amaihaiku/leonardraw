<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LeonarDraw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e0f;--bg2:#161618;--bg3:#1e1e21;
  --border:#2a2a2e;--border2:#3a3a40;
  --fg:#e8e8ea;--fg-muted:#888890;--fg-dim:#55555e;
  --accent:#e8ff47;--acc-bg:rgba(232,255,71,0.09);
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --topbar:44px;--nav:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--fg);
  font-family:var(--font);font-size:14px;overflow:hidden;
  -webkit-font-smoothing:antialiased;touch-action:manipulation}
button{cursor:pointer;font-family:var(--font)}
input[type=range]{cursor:pointer}
.hidden{display:none!important}

/* ──────────── LANDING ──────────── */
#landing{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(232,255,71,.07),transparent 60%),var(--bg);
  animation:fu .4s ease;
}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ll{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px}
.lname{font-size:34px;font-weight:800;letter-spacing:-1.5px}
.lsub{font-size:11px;color:var(--fg-muted);font-family:var(--mono);letter-spacing:.5px}
.dz{width:min(340px,88vw);border:1.5px dashed var(--border2);border-radius:14px;
  padding:36px 24px;display:flex;flex-direction:column;align-items:center;gap:10px;
  background:var(--bg2);transition:.2s}
.dz.over{border-color:var(--accent);background:var(--acc-bg)}
.dz-icon{color:var(--fg-dim);transition:.2s}.dz.over .dz-icon{color:var(--accent)}
.dz-title{font-size:15px;font-weight:600}
.dz-or{font-size:12px;color:var(--fg-dim)}
.dz-fmt{font-size:11px;color:var(--fg-dim);font-family:var(--mono);letter-spacing:1px}
.btn-acc{background:var(--accent);color:#0e0e0f;border:none;border-radius:8px;
  padding:11px 28px;font-family:var(--font);font-weight:700;font-size:14px;
  transition:.15s;display:inline-flex;align-items:center;gap:8px}
.btn-acc:hover{background:#f3ff60;transform:translateY(-1px)}

/* ──────────── EDITOR ──────────── */
#editor{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}

#topbar{height:var(--topbar);flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:0 12px;
  background:var(--bg2);border-bottom:1px solid var(--border)}
.tb-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid var(--border);border-radius:6px;
  color:var(--fg-muted);transition:.15s}
.tb-btn:hover{border-color:var(--border2);color:var(--fg)}
.tb-title{font-size:14px;font-weight:700;letter-spacing:-.3px}

#preview-area{
  flex:1;min-height:0;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:20px 20px;background-color:var(--bg);
  cursor:pointer;
}
#preview-canvas{display:block;max-width:100%;max-height:100%}
.spin{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(14,14,15,.6);backdrop-filter:blur(4px);pointer-events:none}
.sring{width:34px;height:34px;border:2px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

#preview-fs{position:fixed;inset:0;z-index:300;background:#000;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
#preview-fs canvas{max-width:100%;max-height:100%;display:block}

#panel{flex-shrink:0;display:flex;flex-direction:column;
  background:var(--bg2);border-top:1px solid var(--border)}

#algo-strip{flex-shrink:0;display:flex;flex-direction:column}
#mode-row{display:flex;align-items:center;padding:4px 8px;gap:3px;
  border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;
  flex-shrink:0;min-height:52px}
#mode-row::-webkit-scrollbar{display:none}
.mode-btn{flex-shrink:0;min-width:66px;height:44px;padding:0 5px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  border-radius:7px;border:1px solid transparent;
  background:transparent;color:var(--fg-muted);font-size:9px;font-family:var(--mono);
  transition:.15s;white-space:nowrap}
.mode-btn svg{display:block;flex-shrink:0}
.mode-btn:hover{border-color:var(--border);color:var(--fg)}
.mode-btn.active{border-color:var(--accent);background:var(--acc-bg);color:var(--accent)}
.mode-sep{width:1px;height:32px;background:var(--border);flex-shrink:0;margin:0 3px}

#param-lbl-row{height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-family:var(--mono);color:var(--fg-muted);letter-spacing:.8px;
  text-transform:uppercase;border-bottom:1px solid var(--border)}

#main-sl-row{height:46px;flex-shrink:0;display:flex;align-items:center;
  padding:0 14px;gap:10px;border-bottom:1px solid var(--border)}
.sle{font-size:10px;font-family:var(--mono);color:var(--fg-dim);flex-shrink:0;width:26px}
.sle.r{text-align:right}
#main-sl{flex:1;-webkit-appearance:none;appearance:none;height:4px;
  background:var(--border2);border-radius:2px;outline:none}
#main-sl::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;
  border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--bg2)}
#main-sl::-moz-range-thumb{width:20px;height:20px;border-radius:50%;
  background:var(--accent);border:3px solid var(--bg2)}
#sl-val{font-size:13px;font-family:var(--mono);color:var(--accent);width:40px;text-align:right;flex-shrink:0}

#content-area{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
#content-area::-webkit-scrollbar{width:3px}
#content-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

#bottom-nav{height:var(--nav);flex-shrink:0;display:flex;
  border-top:1px solid var(--border)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:transparent;border:none;color:var(--fg-dim);font-size:10px;font-family:var(--mono);
  border-top:2px solid transparent;transition:.15s}
.nav-btn svg{display:block}
.nav-btn:hover{color:var(--fg-muted)}
.nav-btn.active{color:var(--accent);border-top-color:var(--accent)}

.cpanel{display:none;padding:10px 12px;flex-direction:column;gap:10px}
.cpanel.active{display:flex}
.clbl{font-size:10px;font-family:var(--mono);color:var(--fg-dim);
  text-transform:uppercase;letter-spacing:.9px;margin-bottom:4px}
.btn-row{display:flex;gap:5px;flex-wrap:wrap}
.e-btn{flex:1;min-width:58px;padding:8px 4px;border-radius:6px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--fg-muted);font-size:10px;font-family:var(--mono);
  display:flex;flex-direction:column;align-items:center;gap:4px;transition:.15s}
.e-btn:hover{border-color:var(--border2);color:var(--fg)}
.e-btn svg{display:block}
.tone-list{display:flex;flex-direction:column;gap:8px}
.trow{display:grid;grid-template-columns:78px 1fr 34px;align-items:center;gap:6px}
.trow label{font-size:11px;color:var(--fg-muted)}
.tv{font-size:11px;font-family:var(--mono);color:var(--accent);text-align:right}
.tsl{-webkit-appearance:none;appearance:none;width:100%;height:3px;
  background:var(--border2);border-radius:2px;outline:none}
.tsl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--accent);box-shadow:0 0 0 2px var(--bg2)}
.tsl::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
  background:var(--accent);border:2px solid var(--bg2)}
.btn-ghost{background:transparent;border:1px solid var(--border);border-radius:6px;
  padding:5px 12px;color:var(--fg-muted);font-size:11px;font-family:var(--mono);
  transition:.15s;align-self:flex-start}
.btn-ghost:hover{border-color:var(--border2);color:var(--fg)}

.fmt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.fc{cursor:pointer}.fc input{display:none}
.fi{display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px;
  border-radius:6px;border:1px solid var(--border);background:var(--bg3);transition:.15s}
.fc:hover .fi{border-color:var(--border2)}
.fc input:checked~.fi{border-color:var(--accent);background:var(--acc-bg)}
.fn{font-size:14px;font-weight:700;font-family:var(--mono)}
.fd{font-size:9px;color:var(--fg-muted)}
.paper-row{display:flex;gap:5px;flex-wrap:wrap}
.pb{padding:5px 11px;border-radius:5px;background:var(--bg3);border:1px solid var(--border);
  color:var(--fg-muted);font-family:var(--mono);font-size:11px;transition:.15s}
.pb:hover{border-color:var(--border2);color:var(--fg)}
.pb.active{border-color:var(--accent);color:var(--accent);background:var(--acc-bg)}
.mrow{display:grid;grid-template-columns:68px 1fr 28px;align-items:center;gap:6px}
.mrow label{font-size:11px;color:var(--fg-muted)}
.mv{font-size:11px;font-family:var(--mono);color:var(--accent);text-align:right}
.msl{-webkit-appearance:none;appearance:none;width:100%;height:3px;
  background:var(--border2);border-radius:2px;outline:none}
.msl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--accent);box-shadow:0 0 0 2px var(--bg2)}
.msl::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
  background:var(--accent);border:2px solid var(--bg2)}
.btn-exp{width:100%;padding:13px;background:var(--accent);color:#0e0e0f;border:none;
  border-radius:8px;font-family:var(--font);font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.btn-exp:hover{background:#f3ff60}

@media(min-width:768px){
  #editor{flex-direction:row}
  #topbar{display:none}
  #preview-area{flex:1;height:100%}
  #panel{width:300px;height:100%;border-top:none;border-left:1px solid var(--border);
    flex-direction:column;overflow:hidden}
  #d-hdr{height:52px;display:flex;align-items:center;padding:0 14px;gap:8px;
    border-bottom:1px solid var(--border);flex-shrink:0}
  #d-hdr .dh-t{font-size:15px;font-weight:800;letter-spacing:-.5px;flex:1}
  #d-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
  .dtab{flex:1;padding:8px 4px;background:transparent;border:none;
    border-bottom:2px solid transparent;color:var(--fg-muted);font-size:10px;font-family:var(--mono);
    display:flex;align-items:center;justify-content:center;gap:4px;transition:.15s;margin-bottom:-1px}
  .dtab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .dtab:hover{color:var(--fg)}
  #d-algo{display:none;flex:1;overflow-y:auto;min-height:0;flex-direction:column}
  .d-ac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:10px 12px}
  .dac{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;
    border-radius:6px;border:1px solid var(--border);background:var(--bg3);
    color:var(--fg-muted);font-size:9px;font-family:var(--mono);transition:.15s;text-align:center}
  .dac:hover{border-color:var(--border2);color:var(--fg)}
  .dac.active{border-color:var(--accent);background:var(--acc-bg);color:var(--accent)}
  .dac-icon{height:30px;display:flex;align-items:center;justify-content:center}
  .d-plbl{font-size:10px;font-family:var(--mono);color:var(--fg-dim);
    text-transform:uppercase;letter-spacing:.9px;padding:6px 12px 2px}
  .d-params{display:flex;flex-direction:column;gap:9px;padding:6px 12px 12px}
  .d-prow{display:grid;grid-template-columns:80px 1fr 36px;align-items:center;gap:6px}
  .d-prow label{font-size:11px;color:var(--fg-muted)}
  .d-pv{font-size:11px;font-family:var(--mono);color:var(--accent);text-align:right}
  .d-psl{-webkit-appearance:none;appearance:none;width:100%;height:3px;
    background:var(--border2);border-radius:2px;outline:none}
  .d-psl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
    border-radius:50%;background:var(--accent);box-shadow:0 0 0 2px var(--bg2)}
  .d-psl::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
    background:var(--accent);border:2px solid var(--bg2)}
  #algo-strip{display:none}
  #bottom-nav{display:none}
  #content-area{flex:1;min-height:0}
}
@media(max-width:767px){
  #d-hdr{display:none}
  #d-tabs{display:none}
  #d-algo{display:none!important}
}

#crop-modal{position:fixed;inset:0;z-index:400;display:flex;flex-direction:column;
  background:rgba(0,0,0,.92)}
#crop-bg{position:absolute;inset:0;pointer-events:none}
#crop-region{flex:1;position:relative;overflow:hidden}
#crop-box{position:absolute;border:1.5px solid rgba(232,255,71,.8);cursor:move;
  box-shadow:0 0 0 9999px rgba(0,0,0,.5)}
.cc{position:absolute;width:14px;height:14px;border-color:var(--accent);border-style:solid}
.cc.tl{top:-2px;left:-2px;border-width:2px 0 0 2px;cursor:nw-resize}
.cc.tr{top:-2px;right:-2px;border-width:2px 2px 0 0;cursor:ne-resize}
.cc.bl{bottom:-2px;left:-2px;border-width:0 0 2px 2px;cursor:sw-resize}
.cc.br{bottom:-2px;right:-2px;border-width:0 2px 2px 0;cursor:se-resize}
.cgrid{position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(232,255,71,.12) 1px,transparent 1px),
    linear-gradient(90deg,rgba(232,255,71,.12) 1px,transparent 1px);
  background-size:33.33% 33.33%}
#crop-bar{padding:10px 12px;background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0}
.cr-rat{display:flex;gap:4px;flex:1;justify-content:center}
.rb{padding:5px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;
  color:var(--fg-muted);font-family:var(--mono);font-size:11px;transition:.15s}
.rb.active,.rb:hover{border-color:var(--accent);color:var(--accent)}
.cact{padding:7px 16px;border-radius:6px;border:none;font-family:var(--font);font-size:12px;font-weight:600;transition:.15s}
.cact.cancel{background:transparent;border:1px solid var(--border2);color:var(--fg-muted)}
.cact.apply{background:var(--accent);color:#0e0e0f}
.cact.apply:hover{background:#f3ff60}

#toast{position:fixed;bottom:calc(var(--nav)+10px);left:50%;
  transform:translateX(-50%) translateY(6px);
  background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
  padding:7px 16px;font-size:12px;font-family:var(--mono);
  z-index:999;opacity:0;transition:.2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){#toast{bottom:20px}}
</style>
</head>
<body>

<div id="landing">
  <div class="ll">
    <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
      <circle cx="30" cy="30" r="27" stroke="#e8ff47" stroke-width="1.5" fill="none"/>
      <rect x="10" y="10" width="40" height="40" stroke="#e8ff47" stroke-width="1" fill="none" opacity=".35"/>
      <circle cx="30" cy="16" r="4" stroke="#e8ff47" stroke-width="1.5" fill="none"/>
      <line x1="30" y1="20" x2="30" y2="42" stroke="#e8ff47" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="10" y1="28" x2="50" y2="28" stroke="#e8ff47" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="18" y1="32" x2="42" y2="32" stroke="#e8ff47" stroke-width=".8" stroke-linecap="round" opacity=".45"/>
      <line x1="30" y1="42" x2="16" y2="55" stroke="#e8ff47" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="30" y1="42" x2="44" y2="55" stroke="#e8ff47" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="30" y1="42" x2="22" y2="55" stroke="#e8ff47" stroke-width=".9" stroke-linecap="round" opacity=".35"/>
      <line x1="30" y1="42" x2="38" y2="55" stroke="#e8ff47" stroke-width=".9" stroke-linecap="round" opacity=".35"/>
    </svg>
    <div class="lname">LeonarDraw</div>
    <div class="lsub">Képből plotter-kész vektorgrafika</div>
  </div>
  <div class="dz" id="dz">
    <div class="dz-icon"><svg width="38" height="38" viewBox="0 0 38 38" fill="none"><rect x="3" y="3" width="32" height="32" rx="5" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/><path d="M19 12v14M13 18l6-6 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="dz-title">Húzd ide a képet</div>
    <div class="dz-or">vagy</div>
    <button class="btn-acc" id="btn-choose">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 10v2a1 1 0 001 1h9a1 1 0 001-1v-2M7.5 2v9M4.5 5l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Fájl kiválasztása
    </button>
    <div class="dz-fmt">JPG · PNG · WEBP · GIF</div>
  </div>
  <input type="file" id="fi0" accept="image/*" style="display:none">
</div>

<div id="editor" class="hidden">
  <div id="topbar">
    <button class="tb-btn" id="btn-back"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <span class="tb-title">LeonarDraw</span>
    <button class="tb-btn" id="btn-newfile"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 10v2a1 1 0 001 1h8a1 1 0 001-1v-2M8 2v9M5 5l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  </div>
  <input type="file" id="fi1" accept="image/*" style="display:none">

  <div id="preview-area">
    <canvas id="preview-canvas"></canvas>
    <div class="spin hidden" id="spinner"><div class="sring"></div></div>
  </div>

  <div id="panel">
    <div id="d-hdr">
      <div class="dh-t">LeonarDraw</div>
      <button class="tb-btn" id="btn-back-d"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M9 3L4 7.5 9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <button class="tb-btn" id="btn-newfile-d"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 10v2a1 1 0 001 1h9a1 1 0 001-1v-2M7.5 2v9M4.5 5l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
    <div id="d-tabs">
      <button class="dtab active" data-sec="edit">✏ Szerkesztés</button>
      <button class="dtab" data-sec="algo">〰 Algoritmus</button>
      <button class="dtab" data-sec="export">↑ Export</button>
    </div>

    <div id="d-algo">
      <div class="d-ac-grid" id="d-ac-grid"></div>
      <div class="d-plbl">Paraméterek</div>
      <div class="d-params" id="d-params"></div>
    </div>

    <div id="algo-strip" class="hidden">
      <div id="mode-row">
        <button class="mode-btn active" data-algo="squiggle-h">
          <svg width="38" height="18" viewBox="0 0 38 18" fill="none"><path d="M1 5 Q5.5 1 10 5 Q14.5 9 19 5 Q23.5 1 28 5 Q32.5 9 37 5" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/><path d="M1 13 Q5.5 9 10 13 Q14.5 17 19 13 Q23.5 9 28 13 Q32.5 17 37 13" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round" opacity=".4"/></svg>
          Vízszintes
        </button>
        <button class="mode-btn" data-algo="squiggle-v">

<script>
'use strict';
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const S={
  original:null,cropped:null,processed:null,paths:null,
  algo:'squiggle-h',
  params:{lineCount:80,frequency:50,amplitude:5,sampling:2},
  tone:{brightness:0,contrast:0,blackPoint:0,whitePoint:255,gamma:1.0},
  paper:{w:210,h:297,margin:10},
  activeParamIdx:0,activeSection:'edit',
};

// ── PARAM DEFS (Javított, a leskálázáshoz optimalizált értékekkel)
const PDEFS={
  'squiggle-h':[
    {id:'lineCount', label:'Vonalak száma', min:10,  max:200, step:1,   def:80},
    {id:'amplitude', label:'Amplitúdó',    min:1,   max:100, step:1,   def:5},
    {id:'frequency', label:'Frekvencia',   min:5,   max:256, step:1,   def:50},
    {id:'sampling',  label:'Mintavétel',   min:1,   max:10,  step:1,   def:2},
  ],
  'squiggle-v':[
    {id:'lineCount', label:'Vonalak száma', min:10,  max:200, step:1,   def:80},
    {id:'amplitude', label:'Amplitúdó',    min:1,   max:100, step:1,   def:5},
    {id:'frequency', label:'Frekvencia',   min:5,   max:256, step:1,   def:50},
    {id:'sampling',  label:'Mintavétel',   min:1,   max:10,  step:1,   def:2},
  ],
  'squiggle-both':[
    {id:'lineCount', label:'Vonalak száma', min:10,  max:200, step:1,   def:50},
    {id:'amplitude', label:'Amplitúdó',    min:1,   max:100, step:1,   def:4},
    {id:'frequency', label:'Frekvencia',   min:5,   max:256, step:1,   def:50},
    {id:'sampling',  label:'Mintavétel',   min:1,   max:10,  step:1,   def:2},
  ],
  'spiral':[
    {id:'lineCount', label:'Körök száma',   min:10,  max:300, step:1,   def:100},
    {id:'amplitude', label:'Amplitúdó',    min:1,   max:100, step:1,   def:5},
    {id:'frequency', label:'Frekvencia',   min:5,   max:256, step:1,   def:50},
    {id:'sampling',  label:'Mintavétel',   min:1,   max:10,  step:1,   def:2},
  ],
};

const $=id=>document.getElementById(id);
const pa=$('preview-area'),pc=$('preview-canvas'),ctx=pc.getContext('2d'),sp=$('spinner');

function init(){
  setupFile();setupNav();setupEdit();setupExport();
  buildDesktopCards();initParams('squiggle-h');setupPreviewTap();
  document.querySelectorAll('#mode-row .mode-btn[data-algo]').forEach(b=>{
    b.onclick=()=>selectAlgo(b.dataset.algo);
  });
}

function setupFile(){
  $('btn-choose').onclick=()=>{$('fi0').value='';$('fi0').click()};
  $('fi0').onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
  $('btn-newfile').onclick=()=>{$('fi1').value='';$('fi1').click()};
  $('btn-newfile-d').onclick=()=>{$('fi1').value='';$('fi1').click()};
  $('fi1').onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
  const dz=$('dz');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))loadFile(f)});
  document.addEventListener('paste',e=>{const it=[...e.clipboardData.items].find(i=>i.type.startsWith('image/'));if(it)loadFile(it.getAsFile())});
}
function loadFile(f){
  const url=URL.createObjectURL(f);
  const img=new Image();
  img.onload=()=>{
    S.original=toData(img);S.cropped=S.original;S.paths=null;
    applyToneAndDraw();
    $('landing').classList.add('hidden');
    $('editor').classList.remove('hidden');
    URL.revokeObjectURL(url);
    scheduleRender();
  };
  img.src=url;
}
function toData(img){
  const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
  c.getContext('2d').drawImage(img,0,0);return c.getContext('2d').getImageData(0,0,c.width,c.height);
}

function setupNav(){
  document.querySelectorAll('#bottom-nav .nav-btn').forEach(b=>b.onclick=()=>switchSec(b.dataset.sec));
  document.querySelectorAll('#d-tabs .dtab').forEach(b=>b.onclick=()=>switchSec(b.dataset.sec));
  $('btn-back').onclick=$('btn-back-d').onclick=()=>{$('editor').classList.add('hidden');$('landing').classList.remove('hidden')};
}
function switchSec(sec){
  S.activeSection=sec;
  document.querySelectorAll('#bottom-nav .nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.sec===sec));
  document.querySelectorAll('#d-tabs .dtab').forEach(b=>b.classList.toggle('active',b.dataset.sec===sec));
  const isMobile=window.innerWidth<768;
  $('cp-edit').classList.toggle('active',sec==='edit');
  $('cp-export').classList.toggle('active',sec==='export');
  $('content-area').style.display=(isMobile&&sec==='algo')?'none':'';
  $('algo-strip').classList.toggle('hidden',!(isMobile&&sec==='algo'));
  $('d-algo').style.display=(!isMobile&&sec==='algo')?'flex':'none';
}

function setupPreviewTap(){
  pa.onclick=()=>{
    if(!S.processed)return;
    const fs=$('preview-fs'),fsc=$('fs-canvas');
    fs.classList.remove('hidden');
    fsc.width=pc.width;fsc.height=pc.height;
    fsc.getContext('2d').drawImage(pc,0,0);
    const sw=window.innerWidth,sh=window.innerHeight,sc=Math.min(sw/pc.width,sh/pc.height);
    fsc.style.width=Math.round(pc.width*sc)+'px';
    fsc.style.height=Math.round(pc.height*sc)+'px';
  };
  $('preview-fs').onclick=()=>$('preview-fs').classList.add('hidden');
}

function setupEdit(){
  $('btn-rotl').onclick=()=>{if(!S.cropped)return;S.cropped=rotData(S.cropped,-90);S.paths=null;applyToneAndDraw();scheduleRender()};
  $('btn-rotr').onclick=()=>{if(!S.cropped)return;S.cropped=rotData(S.cropped,90);S.paths=null;applyToneAndDraw();scheduleRender()};
  $('btn-flip').onclick=()=>{if(!S.cropped)return;S.cropped=flipData(S.cropped);S.paths=null;applyToneAndDraw();scheduleRender()};
  $('btn-crop').onclick=openCrop;
  [['tsl-bright','tv-bright','brightness',v=>v,v=>v],
   ['tsl-contrast','tv-contrast','contrast',v=>v,v=>v],
   ['tsl-black','tv-black','blackPoint',v=>v,v=>v],
   ['tsl-white','tv-white','whitePoint',v=>v,v=>v],
   ['tsl-gamma','tv-gamma','gamma',v=>v/100,v=>(v/100).toFixed(1)]
  ].forEach(([si,vi,key,toS,toD])=>{
    $(si).oninput=()=>{S.tone[key]=toS(parseFloat($(si).value));$(vi).textContent=toD(parseFloat($(si).value));deb(()=>{applyToneAndDraw();scheduleRender()},60,'tone')()};
  });
  $('btn-reset-tone').onclick=()=>{
    S.tone={brightness:0,contrast:0,blackPoint:0,whitePoint:255,gamma:1.0};
    [['tsl-bright',0],['tsl-contrast',0],['tsl-black',0],['tsl-white',255],['tsl-gamma',100]].forEach(([id,v])=>$(id).value=v);
    ['tv-bright','tv-contrast','tv-black'].forEach(id=>$(id).textContent='0');
    $('tv-white').textContent='255';$('tv-gamma').textContent='1.0';
    applyToneAndDraw();scheduleRender();
  };
}
function rotData(d,deg){
  const{width:w,height:h}=d,cw=(deg===90||deg===-90)?h:w,ch=(deg===90||deg===-90)?w:h;
  const c=document.createElement('canvas');c.width=cw;c.height=ch;
  const cx=c.getContext('2d');cx.translate(cw/2,ch/2);cx.rotate(deg*Math.PI/180);
  const t=document.createElement('canvas');t.width=w;t.height=h;t.getContext('2d').putImageData(d,0,0);
  cx.drawImage(t,-w/2,-h/2);return cx.getImageData(0,0,cw,ch);
}
function flipData(d){
  const{width:w,height:h}=d,c=document.createElement('canvas');c.width=w;c.height=h;
  const cx=c.getContext('2d');cx.translate(w,0);cx.scale(-1,1);
  const t=document.createElement('canvas');t.width=w;t.height=h;t.getContext('2d').putImageData(d,0,0);
  cx.drawImage(t,0,0);return cx.getImageData(0,0,w,h);
}

function applyTone(id){
  const{brightness,contrast,blackPoint,whitePoint,gamma}=S.tone;
  const src=id.data,out=new ImageData(id.width,id.height),d=out.data;
  const rng=Math.max(1,whitePoint-blackPoint),cf=(259*(contrast+255))/(255*(259-contrast));
  const lut=new Uint8Array(256);
  for(let i=0;i<256;i++){let v=((i-blackPoint)/rng)*255;v+=brightness*2.55;v=cf*(v-128)+128;if(gamma!==1.0)v=Math.pow(Math.max(0,v)/255,1/gamma)*255;lut[i]=Math.max(0,Math.min(255,Math.round(v)));}
  for(let i=0;i<src.length;i+=4){d[i]=lut[src[i]];d[i+1]=lut[src[i+1]];d[i+2]=lut[src[i+2]];d[i+3]=src[i+3];}
  return out;
}

// ══════════════════════════════════════════
// VÁLTOZÁS: SKÁLÁZÁS MAX 800 PIXELRE
// Így a paraméterek konstans méreten operálnak.
// ══════════════════════════════════════════
function applyToneAndDraw(){
  if(!S.cropped)return;
  
  // 1. Az eredeti (levágott) kép méretének csökkentése feldolgozás előtt
  const MAX_DIM = 800;
  let cw = S.cropped.width;
  let ch = S.cropped.height;
  
  if(cw > MAX_DIM || ch > MAX_DIM) {
    const scale = Math.min(MAX_DIM/cw, MAX_DIM/ch);
    cw = Math.round(cw * scale);
    ch = Math.round(ch * scale);
  }
  
  const tempC = document.createElement('canvas');
  tempC.width = cw; tempC.height = ch;
  const tempCtx = tempC.getContext('2d');
  
  const oc = document.createElement('canvas');
  oc.width = S.cropped.width; oc.height = S.cropped.height;
  oc.getContext('2d').putImageData(S.cropped, 0, 0);
  
  // A Canvas API gyönyörűen, élsimítva átméretezi
  tempCtx.drawImage(oc, 0, 0, cw, ch);
  const scaledData = tempCtx.getImageData(0, 0, cw, ch);
  
  // 2. Erre a 800px-es adatra hajtjuk végre a tónusokat
  S.processed = applyTone(scaledData);
  
  const img = S.processed;
  const mxW = pa.clientWidth || 400, mxH = pa.clientHeight || 400;
  const sc = Math.min(mxW/img.width, mxH/img.height, 1);
  
  pc.width = Math.round(img.width*sc); pc.height = Math.round(img.height*sc);
  
  const t = document.createElement('canvas');
  t.width = img.width; t.height = img.height;
  t.getContext('2d').putImageData(img, 0, 0);
  ctx.clearRect(0,0,pc.width,pc.height);
  ctx.drawImage(t, 0, 0, pc.width, pc.height);
}

function initParams(algo){
  const defs=PDEFS[algo]||[];
  S.params={};defs.forEach(p=>S.params[p.id]=p.def);
  S.activeParamIdx=0;
  buildMobileParamBtns(algo);
  buildDesktopParams(algo);
  setMainSlider(algo,0);
}
function buildMobileParamBtns(algo){
  const defs=PDEFS[algo]||[];
  const c=$('param-btns');c.innerHTML='';
  const short={lineCount:'Vonalak',frequency:'Frekvencia',amplitude:'Amplitúdó',sampling:'Mintavétel'};
  defs.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='mode-btn'+(i===0?' active':'');
    b.innerHTML=`<span style="font-size:10px;font-weight:700">${short[p.id]||p.label}</span>`;
    b.style.minWidth='64px';
    b.onclick=()=>{S.activeParamIdx=i;c.querySelectorAll('.mode-btn').forEach((x,j)=>x.classList.toggle('active',j===i));setMainSlider(algo,i)};
    c.appendChild(b);
  });
}
function fmt(p,v){return p.step<1?parseFloat(v).toFixed(1):Math.round(v)+'';}
function setMainSlider(algo,idx){
  const defs=PDEFS[algo]||[];const p=defs[idx];if(!p)return;
  const ns=$('main-sl').cloneNode(true);$('main-sl').parentNode.replaceChild(ns,$('main-sl'));
  ns.min=p.min;ns.max=p.max;ns.step=p.step;ns.value=S.params[p.id]??p.def;
  $('active-plbl').textContent=p.label;
  $('sl-val').textContent=fmt(p,ns.value);
  $('sl-min').textContent=p.min;$('sl-max').textContent=p.max;
  ns.oninput=()=>{
    const v=parseFloat(ns.value);S.params[p.id]=v;
    $('sl-val').textContent=fmt(p,v);
    const dsl=document.querySelector(`#d-params .d-psl[data-pid="${p.id}"]`);
    if(dsl){dsl.value=v;const pv=dsl.parentElement.querySelector('.d-pv');if(pv)pv.textContent=fmt(p,v);}
    scheduleRender();
  };
}
function buildDesktopCards(){
  const cards=[
    {a:'squiggle-h',l:'Vízszintes',s:`<svg width="44" height="22" viewBox="0 0 44 22" fill="none"><path d="M1 6 Q6 1 11 6 Q16 11 22 6 Q28 1 33 6 Q38 11 43 6" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/><path d="M1 16 Q6 11 11 16 Q16 21 22 16 Q28 11 33 16 Q38 21 43 16" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round" opacity=".4"/></svg>`},
    {a:'squiggle-v',l:'Függőleges',s:`<svg width="22" height="44" viewBox="0 0 22 44" fill="none"><path d="M6 1 Q1 6 6 11 Q11 16 6 22 Q1 28 6 33 Q11 38 6 43" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/><path d="M16 1 Q11 6 16 11 Q21 16 16 22 Q11 28 16 33 Q21 38 16 43" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round" opacity=".4"/></svg>`},
    {a:'squiggle-both',l:'Rács',s:`<svg width="34" height="34" viewBox="0 0 34 34" fill="none"><path d="M1 8 Q5 3 9 8 Q13 13 17 8 Q21 3 25 8 Q29 13 33 8" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/><path d="M1 20 Q5 15 9 20 Q13 25 17 20 Q21 15 25 20 Q29 25 33 20" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round" opacity=".4"/><path d="M8 1 Q3 5 8 9 Q13 13 8 17 Q3 21 8 25 Q13 29 8 33" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round" opacity=".3"/></svg>`},
    {a:'spiral',l:'Spirál',s:`<svg width="34" height="34" viewBox="0 0 34 34" fill="none"><path d="M17 17 m0,-13 a13,13 0 1,1-.1,0 m0,4 a9,9 0 1,0 .1,0 m0,4 a5,5 0 1,1-.1,0" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>`},
  ];
  const ctr=$('d-ac-grid');ctr.innerHTML='';
  cards.forEach(c=>{
    const b=document.createElement('button');
    b.className='dac'+(c.a===S.algo?' active':'');b.dataset.algo=c.a;
    b.innerHTML=`<div class="dac-icon">${c.s}</div><span>${c.l}</span>`;
    b.onclick=()=>selectAlgo(c.a);
    ctr.appendChild(b);
  });
}
function buildDesktopParams(algo){
  const defs=PDEFS[algo]||[];
  const ctr=$('d-params');ctr.innerHTML='';
  defs.forEach(p=>{
    const row=document.createElement('div');row.className='d-prow';
    row.innerHTML=`<label>${p.label}</label><input type="range" class="d-psl" data-pid="${p.id}" min="${p.min}" max="${p.max}" step="${p.step}" value="${S.params[p.id]??p.def}"><span class="d-pv">${fmt(p,S.params[p.id]??p.def)}</span>`;
    ctr.appendChild(row);
    const sl=row.querySelector('input');
    sl.oninput=()=>{
      const v=parseFloat(sl.value);S.params[p.id]=v;
      row.querySelector('.d-pv').textContent=fmt(p,v);
      if(S.activeParamIdx===(PDEFS[algo]||[]).indexOf(p)){const ms=$('main-sl');if(ms){ms.value=v;$('sl-val').textContent=fmt(p,v);}}
      scheduleRender();
    };
  });
}
function selectAlgo(algo){
  S.algo=algo;S.paths=null;
  document.querySelectorAll('.dac').forEach(c=>c.classList.toggle('active',c.dataset.algo===algo));
  document.querySelectorAll('#mode-row .mode-btn[data-algo]').forEach(b=>b.classList.toggle('active',b.dataset.algo===algo));
  initParams(algo);scheduleRender();
}

let rTimer=null;
function scheduleRender(){clearTimeout(rTimer);rTimer=setTimeout(runRender,300);}
function runRender(){
  if(!S.processed)return;
  sp.classList.remove('hidden');
  setTimeout(()=>{
    try{S.paths=renderAlgo(S.processed,S.algo,S.params);drawPaths(S.paths,S.processed.width,S.processed.height);}
    catch(e){console.error(e);toast('Render hiba');}
    sp.classList.add('hidden');
  },16);
}

function getGray(id){
  const{width:w,height:h,data:d}=id;
  const g=new Float32Array(w*h);
  for(let i=0;i<w*h;i++) g[i]=(0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2])/255;
  return{g,w,h};
}
function sg(g,w,h,x,y){return g[Math.max(0,Math.min(h-1,y|0))*w+Math.max(0,Math.min(w-1,x|0))];}

// ══════════════════════════════════════════
// FIXED SquiggleCam ALGORITHMS (Metszés és Skála visszaállítva)
// ══════════════════════════════════════════
function renderAlgo(imgData,algo,params){
  const{g,w,h}=getGray(imgData);
  if(algo==='squiggle-h')return sqH(g,w,h,params);
  if(algo==='squiggle-v')return sqV(g,w,h,params);
  if(algo==='squiggle-both')return[...sqH(g,w,h,params),...sqV(g,w,h,params)];
  if(algo==='spiral')return sqSpiral(g,w,h,params);
  return[];
}

function sqH(g,w,h,{lineCount,amplitude,frequency,sampling}){
  lineCount=Math.max(1,Math.round(lineCount));
  sampling=Math.max(1,Math.round(sampling));
  const spacing=h/lineCount;
  const paths=[];

  for(let li=0;li<lineCount;li++){
    const y0=(li+0.5)*spacing;
    let pts='';
    let a=0; 
    for(let x=0;x<=w;x+=sampling){
      const br=sg(g,w,h,x,y0)*255;
      const dark255 = 255 - br; 
      
      // Fázis növelése - ezt megszorozzuk a sampling-gel, 
      // így a hullámsűrűség konzisztens marad különböző lépésköznél is
      a += (dark255 / frequency) * sampling;
      
      // FIGYELEM: Az eredeti képlet itt VISSZATÉRT! 
      // Ha lineCount kicsi, az amplitúdó hatalmas lesz és METSZIK EGYMÁST a vonalak!
      const r = (dark255 / lineCount) * amplitude;
      
      const py = y0 + Math.sin(a) * r;
      pts += (pts==='' ? `M${x},${py.toFixed(2)}` : ` L${x},${py.toFixed(2)}`);
    }
    if(pts)paths.push(pts);
  }
  return paths;
}

function sqV(g,w,h,{lineCount,amplitude,frequency,sampling}){
  lineCount=Math.max(1,Math.round(lineCount));
  sampling=Math.max(1,Math.round(sampling));
  const spacing=w/lineCount;
  const paths=[];

  for(let li=0;li<lineCount;li++){
    const x0=(li+0.5)*spacing;
    let pts='';
    let a=0; 
    for(let y=0;y<=h;y+=sampling){
      const br=sg(g,w,h,x0,y)*255;
      const dark255 = 255 - br;
      
      a += (dark255 / frequency) * sampling;
      const r = (dark255 / lineCount) * amplitude;
      
      const px = x0 + Math.sin(a) * r;
      pts += (pts==='' ? `M${px.toFixed(2)},${y}` : ` L${px.toFixed(2)},${y}`);
    }
    if(pts)paths.push(pts);
  }
  return paths;
}

function sqSpiral(g,w,h,{lineCount,amplitude,frequency,sampling}){
  lineCount=Math.max(1,Math.round(lineCount));
  sampling=Math.max(1,Math.round(sampling));
  const cx=w/2, cy=h/2, maxR=Math.min(w,h)/2;
  const totalAngle=lineCount*Math.PI*2;
  
  let pts='';
  let a=0; 
  let angle=0;
  let first=true;
  
  while(angle <= totalAngle){
    const t = angle/totalAngle;
    const baseR = t*maxR;
    const sx = cx + Math.cos(angle)*baseR;
    const sy = cy + Math.sin(angle)*baseR;
    
    const dAngle = Math.min(sampling / Math.max(baseR, 1), 0.5);
    
    if(sx>=0 && sx<w && sy>=0 && sy<h){
      const br=sg(g,w,h,sx,sy)*255;
      const dark255 = 255 - br;
      
      const arcLen = Math.max(baseR * dAngle, 1);
      a += (dark255 / frequency) * arcLen;
      
      const r = (dark255 / lineCount) * amplitude;
      const rr = baseR + Math.sin(a) * r;
      const px = cx + Math.cos(angle)*rr;
      const py = cy + Math.sin(angle)*rr;
      
      pts += (first ? `M${px.toFixed(2)},${py.toFixed(2)}` : ` L${px.toFixed(2)},${py.toFixed(2)}`);
      first=false;
    } else {
      first=true; 
    }
    angle += dAngle;
  }
  return pts?[pts]:[];
}

function drawPaths(paths,imgW,imgH){
  const mxW=pa.clientWidth||600,mxH=pa.clientHeight||600;
  const sc=Math.min(mxW/imgW,mxH/imgH,1);
  pc.width=Math.round(imgW*sc);pc.height=Math.round(imgH*sc);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,pc.width,pc.height);
  ctx.strokeStyle='#000';ctx.lineWidth=Math.max(0.3,sc*0.5);
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.save();ctx.scale(sc,sc);
  paths.forEach(d=>ctx.stroke(new Path2D(d)));
  ctx.restore();
}

let CS={};
function openCrop(){
  if(!S.cropped)return;
  const m=$('crop-modal');m.classList.remove('hidden');
  const bg=$('crop-bg');bg.width=window.innerWidth;bg.height=window.innerHeight;
  const bc=bg.getContext('2d');bc.fillStyle='#080808';bc.fillRect(0,0,bg.width,bg.height);
  const img=S.cropped;
  const sc=Math.min(bg.width/img.width,(bg.height-56)/img.height)*0.9;
  const dw=img.width*sc,dh=img.height*sc,dx=(bg.width-dw)/2,dy=((bg.height-56)-dh)/2;
  const t=document.createElement('canvas');t.width=img.width;t.height=img.height;t.getContext('2d').putImageData(img,0,0);
  bc.drawImage(t,dx,dy,dw,dh);
  CS={ix:dx,iy:dy,iw:dw,ih:dh,x:dx,y:dy,w:dw,h:dh,sc,imgW:img.width,imgH:img.height,ratio:'free'};
  posBox();
  document.querySelectorAll('.rb').forEach(b=>{
    b.classList.toggle('active',b.dataset.ratio==='free');
    b.onclick=()=>{document.querySelectorAll('.rb').forEach(x=>x.classList.remove('active'));b.classList.add('active');CS.ratio=b.dataset.ratio;if(CS.ratio!=='free')forceR();posBox();};
  });
  const ob=$('crop-box'),nb=ob.cloneNode(true);ob.parentNode.replaceChild(nb,ob);
  const box=$('crop-box');
  let drag={on:false};
  function pd(e,type){e.preventDefault();const pt=e.touches?e.touches[0]:e;drag={on:true,type,sx:pt.clientX,sy:pt.clientY,bx:CS.x,by:CS.y,bw:CS.w,bh:CS.h};document.addEventListener('mousemove',pm);document.addEventListener('touchmove',pm,{passive:false});document.addEventListener('mouseup',pu);document.addEventListener('touchend',pu);}
  function pm(e){if(!drag.on)return;e.preventDefault();const pt=e.touches?e.touches[0]:e;const dx=pt.clientX-drag.sx,dy=pt.clientY-drag.sy;const{ix,iy,iw,ih}=CS,mn=30;
    if(drag.type==='move'){CS.x=Math.max(ix,Math.min(ix+iw-drag.bw,drag.bx+dx));CS.y=Math.max(iy,Math.min(iy+ih-drag.bh,drag.by+dy));}
    else if(drag.type==='br'){CS.w=Math.max(mn,Math.min(ix+iw-drag.bx,drag.bw+dx));CS.h=Math.max(mn,Math.min(iy+ih-drag.by,drag.bh+dy));}
    else if(drag.type==='bl'){const nw=Math.max(mn,drag.bw-dx);CS.x=drag.bx+drag.bw-nw;CS.w=nw;CS.h=Math.max(mn,Math.min(iy+ih-drag.by,drag.bh+dy));}
    else if(drag.type==='tr'){CS.w=Math.max(mn,Math.min(ix+iw-drag.bx,drag.bw+dx));const nh=Math.max(mn,drag.bh-dy);CS.y=drag.by+drag.bh-nh;CS.h=nh;}
    else if(drag.type==='tl'){const nw=Math.max(mn,drag.bw-dx);CS.x=drag.bx+drag.bw-nw;CS.w=nw;const nh=Math.max(mn,drag.bh-dy);CS.y=drag.by+drag.bh-nh;CS.h=nh;}
    if(CS.ratio!=='free')forceR();posBox();}
  function pu(){drag.on=false;document.removeEventListener('mousemove',pm);document.removeEventListener('touchmove',pm);document.removeEventListener('mouseup',pu);document.removeEventListener('touchend',pu);}
  box.addEventListener('mousedown',e=>pd(e,'move'));box.addEventListener('touchstart',e=>pd(e,'move'),{passive:false});
  box.querySelectorAll('.cc').forEach(c=>{const t=[...c.classList][1];c.addEventListener('mousedown',e=>{e.stopPropagation();pd(e,t)});c.addEventListener('touchstart',e=>{e.stopPropagation();pd(e,t)},{passive:false});});
  $('crop-cancel').onclick=()=>m.classList.add('hidden');
  $('crop-apply').onclick=applyCrop;
}
function posBox(){const b=$('crop-box');b.style.left=CS.x+'px';b.style.top=CS.y+'px';b.style.width=CS.w+'px';b.style.height=CS.h+'px';}
function forceR(){const r=parseFloat(CS.ratio);CS.h=CS.w/r;if(CS.y+CS.h>CS.iy+CS.ih){CS.h=CS.iy+CS.ih-CS.y;CS.w=CS.h*r;}}
function applyCrop(){
  const{x,y,w,h,ix,iy,sc:sc2,imgW,imgH}=CS;
  const sx=Math.max(0,Math.round((x-ix)/sc2)),sy=Math.max(0,Math.round((y-iy)/sc2));
  const sw=Math.min(imgW-sx,Math.round(w/sc2)),sh=Math.min(imgH-sy,Math.round(h/sc2));
  if(sw<2||sh<2)return;
  const t=document.createElement('canvas');t.width=imgW;t.height=imgH;t.getContext('2d').putImageData(S.cropped,0,0);
  const o=document.createElement('canvas');o.width=sw;o.height=sh;o.getContext('2d').drawImage(t,sx,sy,sw,sh,0,0,sw,sh);
  S.cropped=o.getContext('2d').getImageData(0,0,sw,sh);S.paths=null;
  $('crop-modal').classList.add('hidden');applyToneAndDraw();scheduleRender();
}

function setupExport(){
  document.querySelectorAll('.pb').forEach(b=>b.onclick=()=>{document.querySelectorAll('.pb').forEach(x=>x.classList.remove('active'));b.classList.add('active');S.paper.w=parseInt(b.dataset.pw);S.paper.h=parseInt(b.dataset.ph);});
  $('sl-margin').oninput=e=>{S.paper.margin=parseInt(e.target.value);$('mv-margin').textContent=e.target.value;};
  $('btn-export').onclick=doExport;
}
function doExport(){
  if(!S.paths){toast('Nincs render még!');return;}
  const fmt=document.querySelector('input[name="fmt"]:checked').value;
  if(fmt==='svg')expSVG();else expRaster(fmt);
}
function expSVG(){
  const{w:pw,h:ph,margin:pm}=S.paper,iw=S.processed.width,ih=S.processed.height;
  const avW=pw-pm*2,avH=ph-pm*2,sc=Math.min(avW/iw,avH/ih);
  const ox=pm+(avW-iw*sc)/2,oy=pm+(avH-ih*sc)/2;
  const ps=S.paths.map(d=>`  <path d="${d.replace(/(-?\d+\.?\d*),(-?\d+\.?\d*)/g,(_,x,y)=>`${(parseFloat(x)*sc+ox).toFixed(2)},${(parseFloat(y)*sc+oy).toFixed(2)}`)}" fill="none" stroke="#000" stroke-width="0.3" stroke-linecap="round" stroke-linejoin="round"/>`).join('\n');
  const svg=`<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${pw}mm" height="${ph}mm" viewBox="0 0 ${pw} ${ph}">\n  <rect width="${pw}" height="${ph}" fill="#fff"/>\n${ps}\n</svg>`;
  dl(new Blob([svg],{type:'image/svg+xml'}),'leonardraw.svg');
}
function expRaster(fmt){
  const{w:pw,h:ph,margin:pm}=S.paper,dpi=150,mpi=25.4;
  const cw=Math.round(pw/mpi*dpi),ch=Math.round(ph/mpi*dpi);
  const c=document.createElement('canvas');c.width=cw;c.height=ch;
  const cc=c.getContext('2d');cc.fillStyle='#fff';cc.fillRect(0,0,cw,ch);
  const iw=S.processed.width,ih=S.processed.height;
  const mpx=pm/mpi*dpi,avW=cw-mpx*2,avH=ch-mpx*2,sc=Math.min(avW/iw,avH/ih);
  const ox=mpx+(avW-iw*sc)/2,oy=mpx+(avH-ih*sc)/2;
  cc.strokeStyle='#000';cc.lineWidth=Math.max(0.4,sc*0.4);cc.lineCap='round';cc.lineJoin='round';
  cc.save();cc.translate(ox,oy);cc.scale(sc,sc);
  S.paths.forEach(d=>cc.stroke(new Path2D(d)));cc.restore();
  c.toBlob(b=>dl(b,`leonardraw.${fmt}`),fmt==='jpg'?'image/jpeg':'image/png',0.92);
}
function dl(blob,name){const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000);toast('✓ '+name);}

let _tt;
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500);}
const _dbt={};
function deb(fn,delay,key){return()=>{clearTimeout(_dbt[key]);_dbt[key]=setTimeout(fn,delay);};}
window.addEventListener('resize',()=>{if(S.paths)drawPaths(S.paths,S.processed.width,S.processed.height);else if(S.processed)applyToneAndDraw();});

init();
</script>
