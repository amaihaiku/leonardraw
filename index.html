<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LeonarDraw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   LEONARDRAW — teljes újraépítés
════════════════════════════════════════════ */
:root {
  --bg:        #0e0e0f;
  --bg2:       #161618;
  --bg3:       #1e1e21;
  --border:    #2a2a2e;
  --border2:   #3a3a40;
  --fg:        #e8e8ea;
  --fg-muted:  #888890;
  --fg-dim:    #55555e;
  --accent:    #e8ff47;
  --accent-bg: rgba(232,255,71,0.08);
  --r:         8px;
  --font:      'Syne', sans-serif;
  --mono:      'DM Mono', monospace;
  --bottom-bar-h: 56px;
  --tool-row-h:   48px;
  --slider-row-h: 44px;
  --param-label-h:24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);font-size:14px;overflow:hidden;-webkit-font-smoothing:antialiased;touch-action:none}
button{cursor:pointer;font-family:var(--font)}
.hidden{display:none!important}

/* ════════════════════════════════════
   LANDING
════════════════════════════════════ */
#landing{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(232,255,71,0.07) 0%,transparent 60%),var(--bg);
  z-index:100;
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.landing-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:32px}
.landing-icon svg{display:block}
.landing-name{font-size:36px;font-weight:800;letter-spacing:-1.5px}
.landing-sub{font-size:12px;color:var(--fg-muted);font-family:var(--mono);letter-spacing:.5px}

.drop-zone{
  width:min(360px,90vw);
  border:1.5px dashed var(--border2);
  border-radius:14px;
  padding:40px 28px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  background:var(--bg2);
  transition:.2s ease;
}
.drop-zone.over{border-color:var(--accent);background:var(--accent-bg)}
.drop-icon{color:var(--fg-dim);transition:.2s}
.drop-zone.over .drop-icon{color:var(--accent)}
.drop-title{font-size:15px;font-weight:600}
.drop-or{font-size:12px;color:var(--fg-dim)}
.drop-formats{font-size:11px;color:var(--fg-dim);font-family:var(--mono);letter-spacing:1px}

.btn-accent{
  background:var(--accent);color:#0e0e0f;
  border:none;border-radius:var(--r);
  padding:11px 28px;
  font-family:var(--font);font-weight:700;font-size:14px;
  transition:.15s ease;
  display:inline-flex;align-items:center;gap:8px;
}
.btn-accent:hover{background:#f3ff60;transform:translateY(-1px)}
.btn-accent:active{transform:none}

/* ════════════════════════════════════
   EDITOR — full screen layout
════════════════════════════════════ */
#editor{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  background:var(--bg);
}

/* ── PREVIEW AREA ── */
#preview-wrap{
  flex:1;min-height:0;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  background:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:20px 20px;
  background-color:var(--bg);
  overflow:hidden;
}
#preview-canvas{
  max-width:100%;max-height:100%;
  display:block;
  image-rendering:pixelated;
}
.spinner{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(14,14,15,.65);backdrop-filter:blur(4px);
}
.spinner-ring{
  width:36px;height:36px;
  border:2px solid var(--border2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── CONTROL ZONE (below preview) ── */
#control-zone{
  flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--bg2);
  border-top:1px solid var(--border);
}

/* param label row */
#param-label-row{
  height:var(--param-label-h);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-family:var(--mono);color:var(--fg-muted);
  letter-spacing:.8px;text-transform:uppercase;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

/* slider row */
#slider-row{
  height:var(--slider-row-h);
  display:flex;align-items:center;
  padding:0 16px;gap:10px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#slider-row input[type=range]{
  flex:1;
  -webkit-appearance:none;appearance:none;
  height:4px;background:var(--border2);border-radius:2px;outline:none;
}
#slider-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;height:18px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 3px var(--bg2);
}
#slider-row input[type=range]::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;
  background:var(--accent);border:3px solid var(--bg2);
}
.slider-min,.slider-max{
  font-size:10px;font-family:var(--mono);color:var(--fg-dim);
  flex-shrink:0;width:28px;text-align:center;
}
.slider-max{text-align:right}
#slider-val{
  font-size:13px;font-family:var(--mono);color:var(--accent);
  width:40px;text-align:right;flex-shrink:0;
}

/* tool icon row */
#tool-row{
  height:var(--tool-row-h);
  display:flex;align-items:center;
  padding:0 8px;gap:4px;
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  scrollbar-width:none;
  flex-shrink:0;
}
#tool-row::-webkit-scrollbar{display:none}

.tool-btn{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  min-width:56px;height:40px;padding:0 6px;
  border-radius:6px;border:1px solid transparent;
  background:transparent;color:var(--fg-muted);
  font-size:9px;font-family:var(--mono);
  transition:.15s ease;
  white-space:nowrap;
}
.tool-btn svg{display:block;flex-shrink:0}
.tool-btn:hover{color:var(--fg);border-color:var(--border)}
.tool-btn.active{color:var(--accent);border-color:var(--accent);background:var(--accent-bg)}

/* bottom nav bar */
#bottom-nav{
  height:var(--bottom-bar-h);
  display:flex;align-items:stretch;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.nav-btn{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:transparent;border:none;
  color:var(--fg-dim);font-size:10px;font-family:var(--mono);
  border-top:2px solid transparent;
  transition:.15s ease;
}
.nav-btn svg{display:block}
.nav-btn:hover{color:var(--fg-muted)}
.nav-btn.active{color:var(--accent);border-top-color:var(--accent)}

/* ════════════════════════════════════
   DESKTOP (≥768px) — side panel
════════════════════════════════════ */
@media(min-width:768px){
  #editor{flex-direction:row}

  #preview-wrap{flex:1;height:100%}

  #control-zone{
    width:280px;height:100%;
    border-top:none;border-left:1px solid var(--border);
    flex-direction:column;
    overflow-y:auto;
  }

  /* desktop header in control zone */
  #desktop-header{
    height:52px;
    display:flex;align-items:center;
    padding:0 16px;gap:10px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  #desktop-header .d-logo{font-size:16px;font-weight:800;letter-spacing:-.5px;flex:1}
  #desktop-header button{
    width:32px;height:32px;
    display:flex;align-items:center;justify-content:center;
    background:transparent;border:1px solid var(--border);border-radius:6px;
    color:var(--fg-muted);transition:.15s;
  }
  #desktop-header button:hover{border-color:var(--border2);color:var(--fg)}

  /* on desktop param label, slider, tool row stack vertically full width */
  #param-label-row{border-top:1px solid var(--border);height:auto;padding:10px 16px 6px;justify-content:flex-start}
  #slider-row{height:auto;padding:8px 16px;border-bottom:none}
  #tool-row{height:auto;flex-wrap:wrap;padding:8px;gap:6px;overflow-x:visible;border-bottom:none}
  .tool-btn{min-width:60px;height:52px;flex-direction:column;gap:4px;font-size:9px}

  /* desktop section labels */
  .desktop-section{
    padding:12px 16px 4px;
    font-size:10px;font-family:var(--mono);color:var(--fg-dim);
    text-transform:uppercase;letter-spacing:1px;
    border-top:1px solid var(--border);
  }

  /* bottom nav on desktop becomes top tabs */
  #bottom-nav{
    display:none;
  }

  /* desktop nav tabs at top of control panel */
  #desktop-nav{
    display:flex;border-bottom:1px solid var(--border);flex-shrink:0;
  }
  #desktop-nav .dnav-btn{
    flex:1;padding:8px 4px;
    background:transparent;border:none;border-bottom:2px solid transparent;
    color:var(--fg-muted);font-size:11px;font-family:var(--mono);
    display:flex;align-items:center;justify-content:center;gap:4px;
    transition:.15s;margin-bottom:-1px;
  }
  #desktop-nav .dnav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
  #desktop-nav .dnav-btn:hover{color:var(--fg)}

  /* hide mobile-only things */
  #mobile-header{display:none}
}

@media(max-width:767px){
  #desktop-header{display:none}
  #desktop-nav{display:none}
  .desktop-section{display:none}
}

/* ── mobile top bar ── */
#mobile-header{
  height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:10;
}
.mh-btn{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid var(--border);border-radius:6px;
  color:var(--fg-muted);transition:.15s;
}
.mh-btn:hover{border-color:var(--border2);color:var(--fg)}
.mh-title{font-size:14px;font-weight:700;letter-spacing:-.3px}

/* ════════════════════════════════════
   SECTIONS (content panels)
════════════════════════════════════ */
.section-panel{display:none;flex-direction:column}
.section-panel.active{display:flex}

/* edit controls */
.edit-group{padding:8px 12px;display:flex;flex-direction:column;gap:6px}
.edit-group-label{font-size:10px;font-family:var(--mono);color:var(--fg-dim);text-transform:uppercase;letter-spacing:1px}
.edit-row{display:flex;gap:6px;flex-wrap:wrap}
.edit-btn{
  flex:1;min-width:60px;
  padding:8px 6px;border-radius:6px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--fg-muted);font-size:10px;font-family:var(--mono);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:.15s;
}
.edit-btn:hover{border-color:var(--border2);color:var(--fg)}
.edit-btn svg{display:block}

/* tone sliders (edit panel) */
.tone-sliders{padding:4px 12px 10px;display:flex;flex-direction:column;gap:8px}
.tone-row{display:grid;grid-template-columns:80px 1fr 36px;align-items:center;gap:8px}
.tone-row label{font-size:11px;color:var(--fg-muted)}
.tone-row .t-val{font-size:11px;font-family:var(--mono);color:var(--accent);text-align:right}
.tone-row input[type=range]{
  -webkit-appearance:none;appearance:none;
  height:3px;background:var(--border2);border-radius:2px;outline:none;
}
.tone-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 0 2px var(--bg2);
}
.tone-row input[type=range]::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:var(--accent);border:2px solid var(--bg2);
}
.btn-ghost-sm{
  background:transparent;border:1px solid var(--border);border-radius:6px;
  padding:5px 12px;color:var(--fg-muted);font-size:11px;font-family:var(--mono);
  transition:.15s;align-self:flex-start;margin:0 12px;
}
.btn-ghost-sm:hover{border-color:var(--border2);color:var(--fg)}

/* algo cards */
.algo-cards{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:6px;padding:8px 12px;
}
.algo-card{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 4px;border-radius:6px;
  border:1px solid var(--border);background:var(--bg3);
  color:var(--fg-muted);font-size:9px;font-family:var(--mono);
  transition:.15s;text-align:center;
}
.algo-card:hover{border-color:var(--border2);color:var(--fg)}
.algo-card.active{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.algo-icon{height:32px;display:flex;align-items:center;justify-content:center}

/* algo params in control zone */
.algo-params{display:flex;flex-direction:column;gap:0}
.aparam-group{
  padding:6px 12px;
  display:flex;flex-direction:column;gap:6px;
}
.aparam-row{display:grid;grid-template-columns:80px 1fr 38px;align-items:center;gap:8px}
.aparam-row label{font-size:11px;color:var(--fg-muted)}
.aparam-row .ap-val{font-size:11px;font-family:var(--mono);color:var(--accent);text-align:right}
.aparam-row input[type=range]{
  -webkit-appearance:none;appearance:none;
  height:3px;background:var(--border2);border-radius:2px;outline:none;
}
.aparam-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 0 2px var(--bg2);
}
.aparam-row input[type=range]::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:var(--accent);border:2px solid var(--bg2);
}

/* export section */
.export-section{padding:10px 12px;display:flex;flex-direction:column;gap:10px}
.format-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.fmt-card{cursor:pointer}
.fmt-card input{display:none}
.fmt-inner{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:10px 4px;border-radius:6px;
  border:1px solid var(--border);background:var(--bg3);transition:.15s;
}
.fmt-card:hover .fmt-inner{border-color:var(--border2)}
.fmt-card input:checked~.fmt-inner{border-color:var(--accent);background:var(--accent-bg)}
.fmt-name{font-size:14px;font-weight:700;font-family:var(--mono)}
.fmt-desc{font-size:9px;color:var(--fg-muted)}
.paper-row{display:flex;gap:5px;flex-wrap:wrap}
.paper-btn{
  padding:5px 11px;border-radius:5px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--fg-muted);font-family:var(--mono);font-size:11px;
  transition:.15s;
}
.paper-btn:hover{border-color:var(--border2);color:var(--fg)}
.paper-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.export-label{font-size:10px;font-family:var(--mono);color:var(--fg-dim);text-transform:uppercase;letter-spacing:.8px}
.margin-row{display:grid;grid-template-columns:70px 1fr 30px;align-items:center;gap:8px}
.margin-row label{font-size:11px;color:var(--fg-muted)}
.margin-row .m-val{font-size:11px;font-family:var(--mono);color:var(--accent);text-align:right}
.margin-row input[type=range]{
  -webkit-appearance:none;appearance:none;
  height:3px;background:var(--border2);border-radius:2px;outline:none;
}
.margin-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 0 2px var(--bg2);
}
.margin-row input[type=range]::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:var(--accent);border:2px solid var(--bg2);
}

.btn-export-big{
  width:100%;padding:13px;
  background:var(--accent);color:#0e0e0f;
  border:none;border-radius:var(--r);
  font-family:var(--font);font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:.15s;
}
.btn-export-big:hover{background:#f3ff60;transform:translateY(-1px)}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:calc(var(--bottom-bar-h) + 12px);left:50%;
  transform:translateX(-50%) translateY(6px);
  background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
  padding:7px 16px;font-size:12px;font-family:var(--mono);
  z-index:999;opacity:0;transition:.2s ease;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){#toast{bottom:24px}}

/* ── CROP MODAL ── */
#crop-modal{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;
  background:rgba(0,0,0,.9);
}
#crop-canvas-bg{position:absolute;inset:0}
#crop-region{flex:1;position:relative}
#crop-box{
  position:absolute;
  border:1.5px solid rgba(232,255,71,.85);
  cursor:move;
  box-shadow:0 0 0 9999px rgba(0,0,0,.5);
}
.crop-corner{position:absolute;width:14px;height:14px;border-color:var(--accent);border-style:solid}
.crop-corner.tl{top:-2px;left:-2px;border-width:2px 0 0 2px;cursor:nw-resize}
.crop-corner.tr{top:-2px;right:-2px;border-width:2px 2px 0 0;cursor:ne-resize}
.crop-corner.bl{bottom:-2px;left:-2px;border-width:0 0 2px 2px;cursor:sw-resize}
.crop-corner.br{bottom:-2px;right:-2px;border-width:0 2px 2px 0;cursor:se-resize}
.crop-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(232,255,71,.15) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,71,.15) 1px,transparent 1px);
  background-size:33.33% 33.33%;
  pointer-events:none;
}
#crop-bar{
  padding:10px 12px;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.crop-ratios{display:flex;gap:4px;flex:1;justify-content:center}
.ratio-btn{
  padding:5px 10px;border-radius:4px;
  border:1px solid var(--border);background:transparent;
  color:var(--fg-muted);font-family:var(--mono);font-size:11px;
  transition:.15s;
}
.ratio-btn.active,.ratio-btn:hover{border-color:var(--accent);color:var(--accent)}
.crop-action{
  padding:7px 16px;border-radius:6px;border:none;
  font-family:var(--font);font-size:12px;font-weight:600;
  transition:.15s;
}
.crop-cancel{background:transparent;border:1px solid var(--border2);color:var(--fg-muted)}
.crop-cancel:hover{color:var(--fg)}
.crop-apply{background:var(--accent);color:#0e0e0f}
.crop-apply:hover{background:#f3ff60}
</style>
</head>
<body>

<!-- ═══════════════ LANDING ═══════════════ -->
<div id="landing">
  <div class="landing-logo">
    <!-- Leonardo vitruvian-inspired line icon -->
    <div class="landing-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- outer circle -->
        <circle cx="32" cy="32" r="28" stroke="#e8ff47" stroke-width="1.5" fill="none"/>
        <!-- square inscribed -->
        <rect x="12" y="12" width="40" height="40" stroke="#e8ff47" stroke-width="1" fill="none" opacity=".4"/>
        <!-- figure: head -->
        <circle cx="32" cy="18" r="4" stroke="#e8ff47" stroke-width="1.5" fill="none"/>
        <!-- body -->
        <line x1="32" y1="22" x2="32" y2="44" stroke="#e8ff47" stroke-width="1.5" stroke-linecap="round"/>
        <!-- arms spread (vitruvian) -->
        <line x1="12" y1="30" x2="52" y2="30" stroke="#e8ff47" stroke-width="1.2" stroke-linecap="round"/>
        <!-- inner arms -->
        <line x1="20" y1="34" x2="44" y2="34" stroke="#e8ff47" stroke-width="1" stroke-linecap="round" opacity=".5"/>
        <!-- legs spread -->
        <line x1="32" y1="44" x2="18" y2="58" stroke="#e8ff47" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="32" y1="44" x2="46" y2="58" stroke="#e8ff47" stroke-width="1.5" stroke-linecap="round"/>
        <!-- legs closed -->
        <line x1="32" y1="44" x2="24" y2="58" stroke="#e8ff47" stroke-width="1" stroke-linecap="round" opacity=".4"/>

<script>
/* ═══════════════════════════════════════════
   LEONARDRAW — app.js (inline)
════════════════════════════════════════════ */
'use strict';

// ── STATE ──────────────────────────────────
const S = {
  original: null,   // ImageData (original loaded)
  cropped:  null,   // ImageData after crop/rotate
  processed:null,   // ImageData after tone
  paths:    null,   // rendered SVG paths []
  algo: 'squiggle-h',
  params: {},
  tone: { brightness:0, contrast:0, blackPoint:0, whitePoint:255, gamma:1.0 },
  paper: { w:210, h:297, margin:10 },
  activeSection: 'edit',      // edit | algo | export
  activeParamIndex: 0,        // which param the main slider controls
  renderPending: false,
};

// ── ALGORITHM PARAM DEFINITIONS ─────────────
// "mintavétel" = sampleSize = how many pixels per step along the sine
const PARAMS = {
  'squiggle-h': [
    { id:'numLines',   label:'Vonalak száma', min:10,  max:150, step:1,   def:80,  unit:'' },
    { id:'amplitude',  label:'Amplitúdó',     min:0.5, max:3,   step:0.05,def:1.2, unit:'' },
    { id:'frequency',  label:'Frekvencia',    min:0.5, max:10,  step:0.5, def:3,   unit:'' },
    { id:'sampleSize', label:'Mintavétel',    min:1,   max:8,   step:1,   def:3,   unit:'' },
  ],
  'squiggle-v': [
    { id:'numLines',   label:'Vonalak száma', min:10,  max:150, step:1,   def:80,  unit:'' },
    { id:'amplitude',  label:'Amplitúdó',     min:0.5, max:3,   step:0.05,def:1.2, unit:'' },
    { id:'frequency',  label:'Frekvencia',    min:0.5, max:10,  step:0.5, def:3,   unit:'' },
    { id:'sampleSize', label:'Mintavétel',    min:1,   max:8,   step:1,   def:3,   unit:'' },
  ],
  'squiggle-both': [
    { id:'numLines',   label:'Vonalak száma', min:10,  max:150, step:1,   def:60,  unit:'' },
    { id:'amplitude',  label:'Amplitúdó',     min:0.5, max:3,   step:0.05,def:1.0, unit:'' },
    { id:'frequency',  label:'Frekvencia',    min:0.5, max:10,  step:0.5, def:3,   unit:'' },
    { id:'sampleSize', label:'Mintavétel',    min:1,   max:8,   step:1,   def:3,   unit:'' },
  ],
  'spiral': [
    { id:'numLines',   label:'Körök száma',   min:20,  max:300, step:1,   def:120, unit:'' },
    { id:'amplitude',  label:'Amplitúdó',     min:0.5, max:3,   step:0.05,def:1.2, unit:'' },
    { id:'frequency',  label:'Frekvencia',    min:0.5, max:8,   step:0.5, def:4,   unit:'' },
    { id:'sampleSize', label:'Mintavétel',    min:1,   max:8,   step:1,   def:3,   unit:'' },
  ],
};

// ── DOM ────────────────────────────────────
const q = id => document.getElementById(id);
const landing     = q('landing');
const editor      = q('editor');
const previewWrap = q('preview-wrap');
const canvas      = q('preview-canvas');
const spinner     = q('spinner');
const ctx         = canvas.getContext('2d');
const cropModal   = q('crop-modal');
const mobileAlgo  = q('mobile-algo-strip');

// ── INIT ───────────────────────────────────
function init(){
  setupFileLoad();
  setupNav();
  setupEditTab();
  setupAlgoCards();
  setupExport();
  initParams('squiggle-h');
}

// ── FILE LOADING ───────────────────────────
function setupFileLoad(){
  // Landing file input – use label click, not direct input click to avoid double dialog
  q('btn-choose').addEventListener('click', () => q('file-input').click());

  q('file-input').addEventListener('change', e => {
    if(e.target.files[0]) loadFile(e.target.files[0]);
    // reset so same file can be loaded again
    e.target.value = '';
  });

  // Drop zone
  const dz = q('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if(f && f.type.startsWith('image/')) loadFile(f);
  });

  // Editor load new
  q('btn-load-new').addEventListener('click', () => q('file-input-2').click());
  q('btn-load-d') && q('btn-load-d').addEventListener('click', () => q('file-input-2').click());
  q('file-input-2').addEventListener('change', e => {
    if(e.target.files[0]) loadFile(e.target.files[0]);
    e.target.value = '';
  });

  // Paste
  document.addEventListener('paste', e => {
    const item = [...e.clipboardData.items].find(i => i.type.startsWith('image/'));
    if(item) loadFile(item.getAsFile());
  });
}

function loadFile(file){
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    S.original = imgToData(img);
    S.cropped  = S.original;
    S.paths    = null;
    applyToneAndShow();
    showEditor();
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function imgToData(img){
  const c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  c.getContext('2d').drawImage(img, 0, 0);
  return c.getContext('2d').getImageData(0, 0, c.width, c.height);
}

function showEditor(){
  landing.classList.add('hidden');
  editor.classList.remove('hidden');
}

// ── NAV (tabs) ─────────────────────────────
function setupNav(){
  // mobile bottom nav
  document.querySelectorAll('#bottom-nav .nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchSection(btn.dataset.sec));
  });
  // desktop nav
  document.querySelectorAll('#desktop-nav .dnav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchSection(btn.dataset.sec));
  });
  // back buttons
  q('btn-back').addEventListener('click', goLanding);

// ── ROTATE / FLIP ──────────────────────────
function rotateCropped(deg){
  if(!S.cropped) return;
  S.cropped = rotateData(S.cropped, deg);
  S.paths = null;
  applyToneAndShow();
}
function flipCropped(){
  if(!S.cropped) return;
  S.cropped = flipData(S.cropped);
  S.paths = null;
  applyToneAndShow();
}
function rotateData(d, deg){
  const {width:w,height:h} = d;
  const cw = (deg===90||deg===-90)?h:w, ch=(deg===90||deg===-90)?w:h;
  const c=document.createElement('canvas'); c.width=cw;c.height=ch;
  const cx=c.getContext('2d');
  cx.translate(cw/2,ch/2); cx.rotate(deg*Math.PI/180);
  const t=document.createElement('canvas'); t.width=w;t.height=h;
  t.getContext('2d').putImageData(d,0,0);
  cx.drawImage(t,-w/2,-h/2);
  return cx.getImageData(0,0,cw,ch);
}
function flipData(d){
  const {width:w,height:h}=d;
  const c=document.createElement('canvas'); c.width=w;c.height=h;
  const cx=c.getContext('2d'); cx.translate(w,0);cx.scale(-1,1);
  const t=document.createElement('canvas'); t.width=w;t.height=h;
  t.getContext('2d').putImageData(d,0,0); cx.drawImage(t,0,0);
  return cx.getImageData(0,0,w,h);
}

// ── TONE PROCESSING ────────────────────────
function applyTone(imgData){
  const {brightness,contrast,blackPoint,whitePoint,gamma} = S.tone;
  const src = imgData.data;
  const out = new ImageData(imgData.width, imgData.height);
  const d = out.data;
  const lut = new Uint8Array(256);
  const range = Math.max(1, whitePoint - blackPoint);
  const cf = (259*(contrast+255))/(255*(259-contrast));
  for(let i=0;i<256;i++){
    let v = ((i - blackPoint) / range) * 255;
    v += brightness * 2.55;
    v = cf*(v-128)+128;
    if(gamma!==1.0) v = Math.pow(Math.max(0,v)/255, 1/gamma)*255;
    lut[i] = Math.max(0, Math.min(255, Math.round(v)));
  }
  for(let i=0;i<src.length;i+=4){
    d[i]=lut[src[i]]; d[i+1]=lut[src[i+1]]; d[i+2]=lut[src[i+2]]; d[i+3]=src[i+3];
  }
  return out;
}

function applyToneAndShow(){
  if(!S.cropped) return;
  S.processed = applyTone(S.cropped);
  // If paths exist, re-render; else show processed image
  if(S.paths){
    S.paths = null; // force re-render after tone change
  }
  drawToCanvas();
  scheduleRender();
}

function drawToCanvas(){
  if(!S.processed) return;
  const img = S.processed;
  const wrap = previewWrap;
  const maxW = wrap.clientWidth||400, maxH = wrap.clientHeight||400;
  const scale = Math.min(maxW/img.width, maxH/img.height, 1);
  canvas.width  = Math.round(img.width*scale);
  canvas.height = Math.round(img.height*scale);
  const t = document.createElement('canvas');
  t.width=img.width; t.height=img.height;
  t.getContext('2d').putImageData(img,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(t,0,0,canvas.width,canvas.height);
}

// ── AUTO RENDER (debounced) ────────────────

function scheduleRender(){
  clearTimeout(renderTimer);

// ── CROP ───────────────────────────────────
let cropS = {};
function openCrop(){
  if(!S.cropped) return;
  cropModal.classList.remove('hidden');
  // draw image on crop bg canvas
  const bg = q('crop-canvas-bg');
  const region = q('crop-region');
  bg.width = window.innerWidth; bg.height = window.innerHeight;
  const bgCtx = bg.getContext('2d');
  bgCtx.fillStyle='#0a0a0a'; bgCtx.fillRect(0,0,bg.width,bg.height);
  const img=S.cropped;
  const scale=Math.min(bg.width/img.width, (bg.height-60)/img.height)*0.92;
  const dw=img.width*scale, dh=img.height*scale;
  const dx=(bg.width-dw)/2, dy=((bg.height-60)-dh)/2;
  const t=document.createElement('canvas'); t.width=img.width;t.height=img.height;
  t.getContext('2d').putImageData(img,0,0);
  bgCtx.drawImage(t,dx,dy,dw,dh);
  cropS={ix:dx,iy:dy,iw:dw,ih:dh,x:dx,y:dy,w:dw,h:dh,scale,imgW:img.width,imgH:img.height,ratio:'free'};
  positionCropBox();
  setupCropInteraction();
  document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.toggle('active',b.dataset.ratio==='free'));
  document.querySelectorAll('.ratio-btn').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('.ratio-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      cropS.ratio=b.dataset.ratio;
      if(cropS.ratio!=='free') enforceCropRatio();
      positionCropBox();
    };
  });
  q('crop-cancel').onclick=()=>cropModal.classList.add('hidden');
  q('crop-apply').onclick=applyCrop;
}
function positionCropBox(){
  const b=q('crop-box');
  b.style.left=cropS.x+'px'; b.style.top=cropS.y+'px';
  b.style.width=cropS.w+'px'; b.style.height=cropS.h+'px';
}
function enforceCropRatio(){
  const r=parseFloat(cropS.ratio);
  cropS.h=cropS.w/r;
  if(cropS.y+cropS.h>cropS.iy+cropS.ih){ cropS.h=cropS.iy+cropS.ih-cropS.y; cropS.w=cropS.h*r; }
}
function setupCropInteraction(){
  const box=q('crop-box');
  let drag={on:false,type:'',sx:0,sy:0,bx:0,by:0,bw:0,bh:0};
  function down(e,type){
    e.preventDefault(); const pt=e.touches?e.touches[0]:e;
    drag={on:true,type,sx:pt.clientX,sy:pt.clientY,bx:cropS.x,by:cropS.y,bw:cropS.w,bh:cropS.h};
    document.addEventListener('mousemove',move); document.addEventListener('touchmove',move,{passive:false});
    document.addEventListener('mouseup',up); document.addEventListener('touchend',up);
  }
  function move(e){ if(!drag.on)return; e.preventDefault();
    const pt=e.touches?e.touches[0]:e; const dx=pt.clientX-drag.sx,dy=pt.clientY-drag.sy;
    const {ix,iy,iw,ih}=cropS; const mn=30;
    if(drag.type==='move'){ cropS.x=Math.max(ix,Math.min(ix+iw-drag.bw,drag.bx+dx)); cropS.y=Math.max(iy,Math.min(iy+ih-drag.bh,drag.by+dy)); }
    else if(drag.type==='br'){ cropS.w=Math.max(mn,Math.min(ix+iw-drag.bx,drag.bw+dx)); cropS.h=Math.max(mn,Math.min(iy+ih-drag.by,drag.bh+dy)); }
    else if(drag.type==='bl'){ const nw=Math.max(mn,drag.bw-dx); cropS.x=drag.bx+drag.bw-nw; cropS.w=nw; cropS.h=Math.max(mn,Math.min(iy+ih-drag.by,drag.bh+dy)); }
    else if(drag.type==='tr'){ cropS.w=Math.max(mn,Math.min(ix+iw-drag.bx,drag.bw+dx)); const nh=Math.max(mn,drag.bh-dy); cropS.y=drag.by+drag.bh-nh; cropS.h=nh; }
    else if(drag.type==='tl'){ const nw=Math.max(mn,drag.bw-dx); cropS.x=drag.bx+drag.bw-nw; cropS.w=nw; const nh=Math.max(mn,drag.bh-dy); cropS.y=drag.by+drag.bh-nh; cropS.h=nh; }
    if(cropS.ratio!=='free') enforceCropRatio();
    positionCropBox();
  }
  function up(){ drag.on=false;
    document.removeEventListener('mousemove',move); document.removeEventListener('touchmove',move);
    document.removeEventListener('mouseup',up); document.removeEventListener('touchend',up);
  }
  // remove old listeners by cloning
  const newBox=box.cloneNode(true); box.parentNode.replaceChild(newBox,box);
  const nb=q('crop-box');
  nb.addEventListener('mousedown',e=>down(e,'move')); nb.addEventListener('touchstart',e=>down(e,'move'),{passive:false});
  nb.querySelectorAll('.crop-corner').forEach(c=>{
    const t=[...c.classList][1];
    c.addEventListener('mousedown',e=>{e.stopPropagation();down(e,t)});
    c.addEventListener('touchstart',e=>{e.stopPropagation();down(e,t)},{passive:false});
  });
}
function applyCrop(){
  const {x,y,w,h,ix,iy,scale,imgW,imgH}=cropS;
  const sx=Math.max(0,Math.round((x-ix)/scale)), sy=Math.max(0,Math.round((y-iy)/scale));
  const sw=Math.min(imgW-sx,Math.round(w/scale)), sh=Math.min(imgH-sy,Math.round(h/scale));
  if(sw<1||sh<1)return;
  const t=document.createElement('canvas'); t.width=imgW;t.height=imgH;
  t.getContext('2d').putImageData(S.cropped,0,0);
  const o=document.createElement('canvas'); o.width=sw;o.height=sh;
  o.getContext('2d').drawImage(t,sx,sy,sw,sh,0,0,sw,sh);
  S.cropped=o.getContext('2d').getImageData(0,0,sw,sh);
  S.paths=null;
  cropModal.classList.add('hidden');
  applyToneAndShow();
}

// ── GRAY MAP ───────────────────────────────
function grayMap(imgData){
  const {width:w,height:h,data}=imgData;
  const g=new Float32Array(w*h);
  for(let i=0;i<w*h;i++) g[i]=(0.299*data[i*4]+0.587*data[i*4+1]+0.114*data[i*4+2])/255;
  return {g,w,h};
}
function sampleG(g,w,h,x,y){
  return g[Math.max(0,Math.min(h-1,y|0))*w+Math.max(0,Math.min(w-1,x|0))];
}

// ══ THE SQUIGGLE ALGORITHMS ════════════════
/*
  Based on SquiggleDraw by Gregg Wygonik.
  Each horizontal (or vertical) row is a sine wave.
  Amplitude of sine = f(1 - brightness).
  sampleSize = step in pixels between amplitude samples along the row.
  frequency  = how many full sine cycles per sampleSize pixels.
  numLines   = how many rows/columns.
  amplitude  = max amplitude multiplier (in units of row spacing).
*/
function renderAlgo(imgData, algo, params){
  const {g,w,h}=grayMap(imgData);
  if(algo==='squiggle-h') return squiggleH(g,w,h,params);
  if(algo==='squiggle-v') return squiggleV(g,w,h,params);
  if(algo==='squiggle-both') return [...squiggleH(g,w,h,params),...squiggleV(g,w,h,params)];
  if(algo==='spiral') return squiggleSpiral(g,w,h,params);
  return [];
}

function squiggleH(g,w,h,{numLines,amplitude,frequency,sampleSize}){
  numLines=Math.round(numLines); sampleSize=Math.max(1,Math.round(sampleSize));
  const lineSpacing=h/numLines;
  const maxAmp=lineSpacing*amplitude*0.5; // max wave height in pixels
  const paths=[];

  for(let li=0;li<numLines;li++){
    const y0=(li+0.5)*lineSpacing;
    let d='', first=true, xPos=0, angle=0;

    while(xPos<=w){
      const brightness=sampleG(g,w,h,xPos,y0);
      const dark=1-brightness;
      const amp=dark*maxAmp;
      // advance angle proportional to frequency and sampleSize
      const yOff=Math.sin(angle)*amp;
      const px=xPos, py=y0+yOff;
      if(first){ d=`M${px.toFixed(1)},${py.toFixed(1)}`; first=false; }
      else d+=` L${px.toFixed(1)},${py.toFixed(1)}`;
      angle+=frequency*0.2; // frequency controls how fast we cycle
      xPos+=sampleSize;
    }
    if(d) paths.push(d);
  }
  return paths;
}

function squiggleV(g,w,h,{numLines,amplitude,frequency,sampleSize}){
  numLines=Math.round(numLines); sampleSize=Math.max(1,Math.round(sampleSize));
  const colSpacing=w/numLines;
  const maxAmp=colSpacing*amplitude*0.5;
  const paths=[];

  for(let li=0;li<numLines;li++){
    const x0=(li+0.5)*colSpacing;
    let d='', first=true, yPos=0, angle=0;

    while(yPos<=h){
      const brightness=sampleG(g,w,h,x0,yPos);
      const dark=1-brightness;
      const amp=dark*maxAmp;
      const xOff=Math.sin(angle)*amp;
      const px=x0+xOff, py=yPos;
      if(first){ d=`M${px.toFixed(1)},${py.toFixed(1)}`; first=false; }
      else d+=` L${px.toFixed(1)},${py.toFixed(1)}`;
      angle+=frequency*0.2;
      yPos+=sampleSize;
    }
    if(d) paths.push(d);
  }
  return paths;
}

function squiggleSpiral(g,w,h,{numLines,amplitude,frequency,sampleSize}){
  const cx=w/2, cy=h/2;
  const maxR=Math.min(w,h)/2;
  const totalTurns=Math.round(numLines);
  const totalAngle=totalTurns*Math.PI*2;
  // sampleSize controls angular step
  const angStep=(sampleSize/maxR)*2;
  const paths=[];
  let d='', first=true, angle=0;

  while(angle<totalAngle){
    const t=angle/totalAngle;
    const r=t*maxR;
    const px0=cx+Math.cos(angle)*r, py0=cy+Math.sin(angle)*r;
    const brightness=sampleG(g,w,h,px0,py0);
    const dark=1-brightness;
    const maxAmp=(maxR/totalTurns)*amplitude*0.5;
    const amp=dark*maxAmp;
    const ripple=Math.sin(angle*frequency)*amp;
    const rr=r+ripple;
    const px=cx+Math.cos(angle)*rr, py=cy+Math.sin(angle)*rr;
    if(first){ d=`M${px.toFixed(1)},${py.toFixed(1)}`; first=false; }
    else d+=` L${px.toFixed(1)},${py.toFixed(1)}`;
    angle+=angStep;
  }
  if(d) paths.push(d);
  return paths;
}

// ── DRAW PATHS TO CANVAS ───────────────────
function drawPaths(paths, imgW, imgH){
  const maxW=previewWrap.clientWidth||600, maxH=previewWrap.clientHeight||600;
  const scale=Math.min(maxW/imgW, maxH/imgH, 1);
  canvas.width=Math.round(imgW*scale); canvas.height=Math.round(imgH*scale);
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#000000';
  ctx.lineWidth=Math.max(0.4, scale*0.6);
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.save(); ctx.scale(scale,scale);
  paths.forEach(d=>{ const p=new Path2D(d); ctx.stroke(p); });
  ctx.restore();
}

function setupExport(){
  document.querySelectorAll('.paper-btn').forEach(b=>{
    b.addEventListener('click',()=>{

      b.classList.add('active');

    });
  });
  q('sl-margin').addEventListener('input',e=>{ S.paper.margin=parseInt(e.target.value); q('v-margin').textContent=e.target.value; });
  q('btn-export').addEventListener('click', doExport);

function doExport(){
  if(!S.paths){ showToast('Nincs render — kérjük várjon...'); return; }
  const fmt=document.querySelector('input[name="fmt"]:checked').value;
  if(fmt==='svg') exportSVG();
  else exportRaster(fmt);
}

function exportSVG(){
  const {w:pw,h:ph,margin:pm}=S.paper;
  const imgW=S.processed.width, imgH=S.processed.height;
  const avW=pw-pm*2, avH=ph-pm*2;
  const sc=Math.min(avW/imgW, avH/imgH);
  const dw=imgW*sc, dh=imgH*sc;
  const ox=pm+(avW-dw)/2, oy=pm+(avH-dh)/2;

  const pathsStr=S.paths.map(d=>{
    const sd=d.replace(/(-?\d+\.?\d*),(-?\d+\.?\d*)/g,(_,x,y)=>`${(parseFloat(x)*sc+ox).toFixed(2)},${(parseFloat(y)*sc+oy).toFixed(2)}`);
    return `  <path d="${sd}" fill="none" stroke="#000000" stroke-width="0.3" stroke-linecap="round" stroke-linejoin="round"/>`;
  }).join('\n');

  const svg=`<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${pw}mm" height="${ph}mm" viewBox="0 0 ${pw} ${ph}">\n  <rect width="${pw}" height="${ph}" fill="#ffffff"/>\n${pathsStr}\n</svg>`;
  downloadBlob(new Blob([svg],{type:'image/svg+xml'}), 'leonardraw.svg');
}

function exportRaster(fmt){
  const {w:pw,h:ph,margin:pm}=S.paper;
  const dpi=150, mmpIn=25.4;
  const cw=Math.round(pw/mmpIn*dpi), ch=Math.round(ph/mmpIn*dpi);
  const c=document.createElement('canvas'); c.width=cw;c.height=ch;
  const cc=c.getContext('2d');
  cc.fillStyle='#ffffff'; cc.fillRect(0,0,cw,ch);
  const imgW=S.processed.width, imgH=S.processed.height;
  const mxPx=pm/mmpIn*dpi;
  const avW=cw-mxPx*2, avH=ch-mxPx*2;
  const sc=Math.min(avW/imgW, avH/imgH);
  const ox=mxPx+(avW-imgW*sc)/2, oy=mxPx+(avH-imgH*sc)/2;
  cc.strokeStyle='#000000'; cc.lineWidth=Math.max(0.5,sc*0.4);
  cc.lineCap='round'; cc.lineJoin='round';
  cc.save(); cc.translate(ox,oy); cc.scale(sc,sc);
  S.paths.forEach(d=>{ cc.stroke(new Path2D(d)); });
  cc.restore();
  const mime=fmt==='jpg'?'image/jpeg':'image/png';
  c.toBlob(b=>downloadBlob(b,`leonardraw.${fmt}`),mime,0.92);
}

function downloadBlob(blob, name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showToast('✓ '+name+' letöltve');
}

// ── TOAST ──────────────────────────────────
let _tt;
function showToast(msg){
  const t=q('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── DEBOUNCE ───────────────────────────────
const _db={};
function debounce(fn,delay){
  return function(...a){
    const k=fn.name||'fn';
    clearTimeout(_db[k]); _db[k]=setTimeout(()=>fn(...a),delay);
  };
}

// ── RESIZE ─────────────────────────────────
window.addEventListener('resize', ()=>{
  if(S.paths) drawPaths(S.paths,S.processed.width,S.processed.height);
  else if(S.processed) drawToCanvas();
});

init();
</script>
