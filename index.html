<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PlotterCam</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- ═══════════════════════════════════════════
     LANDING / DROP ZONE (no image loaded)
════════════════════════════════════════════ -->
<div id="landing" class="landing">
  <div class="landing-inner">
    <div class="logo-mark">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <path d="M4 12 Q12 8 20 12 Q28 16 36 12 Q44 8 44 12" stroke="var(--accent)" stroke-width="2" fill="none"/>
        <path d="M4 20 Q12 14 20 20 Q28 26 36 20 Q44 14 44 20" stroke="var(--accent)" stroke-width="2" fill="none"/>
        <path d="M4 28 Q12 20 20 28 Q28 36 36 28 Q44 20 44 28" stroke="var(--fg)" stroke-width="2" fill="none"/>
        <path d="M4 36 Q12 26 20 36 Q28 46 36 36 Q44 26 44 36" stroke="var(--fg)" stroke-width="1.5" fill="none" opacity="0.5"/>
      </svg>
    </div>
    <h1 class="logo-text">PlotterCam</h1>
    <p class="logo-sub">Képből plotter-kész vektorgrafika</p>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" hidden>
      <div class="drop-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect x="4" y="4" width="32" height="32" rx="4" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
          <path d="M20 14v12M14 20l6-6 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="drop-text">Húzd ide a képet</p>
      <p class="drop-sub">vagy</p>
      <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
        Fájl kiválasztása
      </button>
      <p class="drop-formats">JPG · PNG · WEBP · GIF</p>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     MAIN EDITOR
════════════════════════════════════════════ -->
<div id="editor" class="editor hidden">

  <!-- TOP BAR -->
  <header class="topbar">
    <button class="topbar-btn" id="btnBack" title="Új kép">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="topbar-title">PlotterCam</span>
    <button class="topbar-btn" id="btnLoadNew" title="Kép betöltése">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M3 12v2a1 1 0 001 1h10a1 1 0 001-1v-2M9 3v9M6 6l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <!-- PREVIEW AREA -->
  <div class="preview-wrap" id="previewWrap">
    <canvas id="previewCanvas"></canvas>
    <div class="preview-spinner hidden" id="previewSpinner">
      <div class="spinner-ring"></div>
    </div>
    <!-- Crop overlay -->
    <div class="crop-overlay hidden" id="cropOverlay">
      <canvas id="cropCanvas"></canvas>
      <div class="crop-handles" id="cropHandles">
        <div class="crop-box" id="cropBox">
          <div class="crop-corner tl"></div>
          <div class="crop-corner tr"></div>
          <div class="crop-corner bl"></div>
          <div class="crop-corner br"></div>
          <div class="crop-grid"></div>
        </div>
      </div>
      <div class="crop-toolbar">
        <button class="crop-btn" id="cropReset">Visszaállít</button>
        <div class="crop-ratios">
          <button class="ratio-btn active" data-ratio="free">Szabad</button>
          <button class="ratio-btn" data-ratio="1">1:1</button>
          <button class="ratio-btn" data-ratio="1.333">4:3</button>
          <button class="ratio-btn" data-ratio="1.414">A4</button>
        </div>
        <button class="crop-btn crop-btn-apply" id="cropApply">Alkalmaz</button>
      </div>
    </div>
  </div>

  <!-- ═══ PANEL (bottom sheet on mobile, right panel on desktop) ═══ -->
  <div class="panel" id="panel">
    <div class="panel-drag-handle" id="panelDragHandle">
      <div class="drag-bar"></div>
    </div>

    <!-- TAB BAR -->
    <div class="tab-bar">
      <button class="tab active" data-tab="edit">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 11.5V14h2.5l7-7-2.5-2.5-7 7zM13.5 4a.7.7 0 000-1L12 1.5a.7.7 0 00-1 0L9.5 3 12 5.5l1.5-1.5z" fill="currentColor"/>
        </svg>
        Szerkesztés
      </button>
      <button class="tab" data-tab="algo">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M1 5 Q4 2 7 5 Q10 8 13 5 Q15 3 15 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M1 9 Q4 5 7 9 Q10 13 13 9 Q15 7 15 9" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        Algoritmus
      </button>
      <button class="tab" data-tab="export">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 10v2a1 1 0 001 1h8a1 1 0 001-1v-2M8 3v7M5 6l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Export
      </button>
    </div>

    <!-- ── TAB: SZERKESZTÉS ── -->
    <div class="tab-content active" id="tab-edit">
      <div class="section">
        <div class="section-label">Vágás &amp; Forgatás</div>
        <div class="tool-row">
          <button class="tool-btn" id="btnCrop">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M4 1v12a1 1 0 001 1h12M1 4h12a1 1 0 011 1v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Vágás
          </button>
          <button class="tool-btn" id="btnRotateCCW">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M3 9a6 6 0 106-6H7M7 1L4 4l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            −90°
          </button>
          <button class="tool-btn" id="btnRotateCW">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M15 9a6 6 0 11-6-6h2M11 1l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            +90°
          </button>
          <button class="tool-btn" id="btnFlipH">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M9 2v14M3 5l-2 4 2 4M15 5l2 4-2 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Tükrözés
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Tónuskorrekció</div>
        <div class="sliders">
          <div class="slider-row">
            <label>Fényerő</label>
            <input type="range" id="slBrightness" min="-100" max="100" value="0" class="slider">
            <span class="slider-val" id="valBrightness">0</span>
          </div>
          <div class="slider-row">
            <label>Kontraszt</label>
            <input type="range" id="slContrast" min="-100" max="100" value="0" class="slider">
            <span class="slider-val" id="valContrast">0</span>
          </div>
          <div class="slider-row">
            <label>Fekete pont</label>
            <input type="range" id="slBlackPoint" min="0" max="128" value="0" class="slider">
            <span class="slider-val" id="valBlackPoint">0</span>
          </div>
          <div class="slider-row">
            <label>Fehér pont</label>
            <input type="range" id="slWhitePoint" min="128" max="255" value="255" class="slider">
            <span class="slider-val" id="valWhitePoint">255</span>
          </div>
          <div class="slider-row">
            <label>Gamma</label>
            <input type="range" id="slGamma" min="50" max="200" value="100" class="slider">
            <span class="slider-val" id="valGamma">1.0</span>
          </div>
        </div>
        <button class="btn-ghost btn-sm" id="btnResetTone">Visszaállítás</button>
      </div>
    </div>

    <!-- ── TAB: ALGORITMUS ── -->
    <div class="tab-content" id="tab-algo">
      <div class="section">
        <div class="section-label">Mód kiválasztása</div>
        <div class="algo-grid" id="algoGrid">
          <button class="algo-card active" data-algo="squiggle-h">
            <div class="algo-icon">
              <svg width="48" height="32" viewBox="0 0 48 32" fill="none">
                <path d="M2 8 Q8 2 14 8 Q20 14 26 8 Q32 2 38 8 Q44 14 46 8" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
                <path d="M2 16 Q8 10 14 16 Q20 22 26 16 Q32 10 38 16 Q44 22 46 16" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
                <path d="M2 24 Q8 22 14 24 Q20 26 26 24 Q32 22 38 24 Q44 26 46 24" stroke="var(--fg-muted)" stroke-width="1" fill="none"/>
              </svg>
            </div>
            <span>Squiggle</span>
          </button>
          <button class="algo-card" data-algo="squiggle-v">
            <div class="algo-icon">
              <svg width="32" height="48" viewBox="0 0 32 48" fill="none">
                <path d="M8 2 Q2 8 8 14 Q14 20 8 26 Q2 32 8 38 Q14 44 8 46" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
                <path d="M16 2 Q10 8 16 14 Q22 20 16 26 Q10 32 16 38 Q22 44 16 46" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
                <path d="M24 2 Q22 8 24 14 Q26 20 24 26 Q22 32 24 38 Q26 44 24 46" stroke="var(--fg-muted)" stroke-width="1" fill="none"/>
              </svg>
            </div>
            <span>Vertical</span>
          </button>
          <button class="algo-card" data-algo="spiral">
            <div class="algo-icon">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <path d="M24 24 m0-18 a18 18 0 1 1 -0.1 0 m0 4 a14 14 0 1 0 0.1 0 m0 4 a10 10 0 1 1 -0.1 0 m0 4 a6 6 0 1 0 0.1 0" stroke="var(--accent)" stroke-width="1.2" fill="none"/>
              </svg>
            </div>
            <span>Spirál</span>
          </button>
          <button class="algo-card" data-algo="hatch">
            <div class="algo-icon">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <line x1="4" y1="4" x2="44" y2="44" stroke="var(--accent)" stroke-width="1.2"/>
                <line x1="12" y1="4" x2="44" y2="36" stroke="var(--accent)" stroke-width="1.2"/>
                <line x1="20" y1="4" x2="44" y2="28" stroke="var(--accent)" stroke-width="1.5"/>
                <line x1="28" y1="4" x2="44" y2="20" stroke="var(--accent)" stroke-width="2"/>
                <line x1="36" y1="4" x2="44" y2="12" stroke="var(--accent)" stroke-width="2"/>
                <line x1="4" y1="12" x2="36" y2="44" stroke="var(--fg-muted)" stroke-width="1"/>
                <line x1="4" y1="20" x2="28" y2="44" stroke="var(--fg-muted)" stroke-width="1"/>
              </svg>
            </div>
            <span>Hatch</span>
          </button>
          <button class="algo-card" data-algo="crosshatch">
            <div class="algo-icon">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <line x1="4" y1="8" x2="44" y2="8" stroke="var(--accent)" stroke-width="1"/>
                <line x1="4" y1="16" x2="44" y2="16" stroke="var(--accent)" stroke-width="1.5"/>
                <line x1="4" y1="24" x2="44" y2="24" stroke="var(--accent)" stroke-width="2"/>
                <line x1="4" y1="32" x2="44" y2="32" stroke="var(--accent)" stroke-width="1.5"/>
                <line x1="4" y1="40" x2="44" y2="40" stroke="var(--accent)" stroke-width="1"/>
                <line x1="8" y1="4" x2="8" y2="44" stroke="var(--fg-muted)" stroke-width="1"/>
                <line x1="16" y1="4" x2="16" y2="44" stroke="var(--fg-muted)" stroke-width="1.5"/>
                <line x1="24" y1="4" x2="24" y2="44" stroke="var(--fg-muted)" stroke-width="2"/>
                <line x1="32" y1="4" x2="32" y2="44" stroke="var(--fg-muted)" stroke-width="1.5"/>
                <line x1="40" y1="4" x2="40" y2="44" stroke="var(--fg-muted)" stroke-width="1"/>
              </svg>
            </div>
            <span>Cross-hatch</span>
          </button>
          <button class="algo-card" data-algo="concentric">
            <div class="algo-icon">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <circle cx="24" cy="24" r="4" stroke="var(--accent)" stroke-width="2"/>
                <circle cx="24" cy="24" r="9" stroke="var(--accent)" stroke-width="1.8"/>
                <circle cx="24" cy="24" r="14" stroke="var(--accent)" stroke-width="1.4"/>
                <circle cx="24" cy="24" r="19" stroke="var(--fg-muted)" stroke-width="1"/>
              </svg>
            </div>
            <span>Koncentrikus</span>
          </button>
          <button class="algo-card" data-algo="flow">
            <div class="algo-icon">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <path d="M4 24 C8 16 16 10 24 14 C32 18 36 28 44 24" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
                <path d="M4 30 C10 20 18 16 26 20 C34 24 38 34 44 30" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
                <path d="M4 18 C8 12 14 8 22 12 C30 16 34 22 44 18" stroke="var(--fg-muted)" stroke-width="1" fill="none"/>
              </svg>
            </div>
            <span>Flow Field</span>
          </button>
          <button class="algo-card" data-algo="stipple">
            <div class="algo-icon">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <circle cx="12" cy="12" r="2.5" fill="var(--accent)"/>
                <circle cx="24" cy="10" r="3" fill="var(--accent)"/>
                <circle cx="36" cy="14" r="2" fill="var(--accent)"/>
                <circle cx="8" cy="24" r="2" fill="var(--accent)"/>
                <circle cx="20" cy="22" r="3.5" fill="var(--accent)"/>
                <circle cx="32" cy="24" r="3" fill="var(--accent)"/>
                <circle cx="42" cy="20" r="2" fill="var(--accent)"/>
                <circle cx="14" cy="36" r="1.5" fill="var(--fg-muted)"/>
                <circle cx="26" cy="38" r="2" fill="var(--fg-muted)"/>
                <circle cx="38" cy="34" r="1.5" fill="var(--fg-muted)"/>
              </svg>
            </div>
            <span>Stipple</span>
          </button>
        </div>
      </div>

      <!-- Dynamic params -->
      <div class="section" id="algoParams">
        <div class="section-label">Paraméterek</div>
        <div class="sliders" id="paramSliders">
          <!-- filled by JS -->
        </div>
      </div>

      <div class="section">
        <div class="section-label">Megjelenés</div>
        <div class="slider-row">
          <label>Vonalszín</label>
          <input type="color" id="lineColor" value="#000000" class="color-picker">
          <span class="slider-val">Fekete</span>
        </div>
        <div class="slider-row">
          <label>Háttér</label>
          <input type="color" id="bgColor" value="#ffffff" class="color-picker">
          <span class="slider-val">Fehér</span>
        </div>
      </div>

      <button class="btn-primary btn-render" id="btnRender">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8l3 3 7-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Renderelés
      </button>
    </div>

    <!-- ── TAB: EXPORT ── -->
    <div class="tab-content" id="tab-export">
      <div class="section">
        <div class="section-label">Fájlformátum</div>
        <div class="format-grid">
          <label class="format-card">
            <input type="radio" name="format" value="svg" checked>
            <div class="format-inner">
              <span class="format-name">SVG</span>
              <span class="format-desc">Plotter, lézer</span>
            </div>
          </label>
          <label class="format-card">
            <input type="radio" name="format" value="png">
            <div class="format-inner">
              <span class="format-name">PNG</span>
              <span class="format-desc">Átlátszóság</span>
            </div>
          </label>
          <label class="format-card">
            <input type="radio" name="format" value="jpg">
            <div class="format-inner">
              <span class="format-name">JPG</span>
              <span class="format-desc">Kis méret</span>
            </div>
          </label>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Papírméret (mm)</div>
        <div class="paper-presets">
          <button class="paper-btn active" data-w="210" data-h="297">A4</button>
          <button class="paper-btn" data-w="297" data-h="420">A3</button>
          <button class="paper-btn" data-w="148" data-h="210">A5</button>
          <button class="paper-btn" data-w="100" data-h="150">10×15</button>
          <button class="paper-btn" data-w="0" data-h="0">Egyedi</button>
        </div>
        <div class="paper-custom" id="paperCustom" style="display:none">
          <div class="slider-row">
            <label>Szélesség (mm)</label>
            <input type="number" id="paperW" value="210" min="50" max="1000" class="num-input">
          </div>
          <div class="slider-row">
            <label>Magasság (mm)</label>
            <input type="number" id="paperH" value="297" min="50" max="1000" class="num-input">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Margó (mm)</div>
        <div class="slider-row">
          <label>Margó</label>
          <input type="range" id="slMargin" min="0" max="30" value="10" class="slider">
          <span class="slider-val" id="valMargin">10</span>
        </div>
      </div>

      <button class="btn-primary btn-export" id="btnExport">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 10v2a1 1 0 001 1h8a1 1 0 001-1v-2M8 3v7M5 6l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Letöltés
      </button>
    </div>
  </div><!-- /panel -->

</div><!-- /editor -->

<!-- Hidden file input for reload -->
<input type="file" id="fileInputReload" accept="image/*" hidden>

<script src="js/app.js"></script>
</body>
</html>
